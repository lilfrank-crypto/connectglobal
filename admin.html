<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectGlobal — Admin Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #060608;
    --surface: #10101a;
    --surface2: #18182a;
    --border: #252538;
    --accent: #6d28d9;
    --accent2: #8b5cf6;
    --danger: #dc2626;
    --success: #059669;
    --gold: #d97706;
    --text: #e2e2f0;
    --muted: #6b7280;
    --radius: 14px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(109,40,217,0.12) 0%, transparent 70%);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .admin-logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .admin-badge {
    display: inline-block;
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #f87171;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent2); }

  .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-top: 6px;
  }

  .btn:hover { filter: brightness(1.1); }

  /* ADMIN LAYOUT */
  .admin-layout {
    display: flex;
    min-height: 100vh;
  }

  .admin-sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
    overflow-y: auto;
  }

  .admin-sidebar::-webkit-scrollbar { display: none; }

  .sidebar-logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    border-radius: 0;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }

  .nav-link:hover { background: var(--surface2); color: var(--text); }
  .nav-link.active { background: rgba(109,40,217,0.15); color: #a78bfa; border-left: 2px solid var(--accent2); }

  .nav-section {
    padding: 12px 20px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--border);
    font-weight: 600;
  }

  .badge {
    background: var(--danger);
    color: white;
    border-radius: 100px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
    margin-left: auto;
  }

  /* MAIN */
  .admin-main {
    margin-left: 240px;
    flex: 1;
    padding: 28px;
    min-height: 100vh;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stat-icon { font-size: 24px; margin-bottom: 10px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-change { font-size: 11px; color: var(--success); margin-top: 6px; }

  /* TABLES */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title { font-weight: 600; font-size: 14px; }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid rgba(37,37,56,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(109,40,217,0.04); }

  .user-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar-sm {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .status-badge {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-badge.active { background: rgba(5,150,105,0.15); color: #34d399; }
  .status-badge.inactive { background: rgba(107,114,128,0.15); color: var(--muted); }
  .status-badge.unlocked { background: rgba(109,40,217,0.15); color: var(--accent2); }

  .action-btn {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    margin-right: 6px;
  }

  .action-btn.edit { background: rgba(109,40,217,0.15); color: var(--accent2); }
  .action-btn.danger { background: rgba(220,38,38,0.1); color: #f87171; }
  .action-btn.success { background: rgba(5,150,105,0.1); color: #34d399; }
  .action-btn:hover { filter: brightness(1.2); }

  /* CHAT PANEL */
  .chat-panel {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 600px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .conv-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .conv-list::-webkit-scrollbar { width: 4px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(37,37,56,0.5);
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: rgba(109,40,217,0.1); }

  .conv-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .conv-name { font-size: 13px; font-weight: 600; }
  .conv-preview { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

  /* REPLY PANEL */
  .reply-panel {
    display: flex;
    flex-direction: column;
  }

  .reply-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
  }

  .reply-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .reply-messages::-webkit-scrollbar { width: 4px; }
  .reply-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg-bubble.user {
    background: rgba(109,40,217,0.2);
    border: 1px solid rgba(109,40,217,0.3);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg-bubble.admin {
    background: linear-gradient(135deg, rgba(109,40,217,0.4), rgba(139,92,246,0.4));
    border: 1px solid rgba(139,92,246,0.3);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .reply-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .reply-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
  }

  .reply-input:focus { border-color: var(--accent2); }

  .send-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
    animation: slideUp 0.2s;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .input-group { margin-bottom: 14px; }

  .input-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .btn-modal {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    border: none;
    transition: all 0.2s;
  }

  .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border) !important; color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    animation: slideUp 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    width: 200px;
  }

  .search-input:focus { border-color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* PROFILE LIST */
  .profiles-grid-admin {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .profile-admin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .profile-admin-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
  }

  .profile-admin-body { padding: 12px; }
  .profile-admin-name { font-weight: 600; font-size: 13px; }
  .profile-admin-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .profile-admin-actions { display: flex; gap: 6px; margin-top: 10px; }
</style>
</head>
<body>
<div id="admin-app"></div>

<script>
// ============================================================
// ADMIN STATE
// ============================================================
let adminState = {
  view: 'login',
  page: 'overview',  // overview | users | messages | profiles | transactions | analytics
  
  users: [],
  conversations: {},
  transactions: [],

  pendingUnlocks: [], // { userId, userName, phone, time } — users who paid, waiting for admin unlock
  unlockedUsers: {}, // userId -> true

  activeConv: null,
  replyText: '',
  modal: null, // { type, data }
  toast: null,
  search: '',
  editUser: null,  // user being edited in modal
};

const ADMIN_CREDS = { user: 'admin', pass: 'franklink.01' };

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('admin-app');
  
  if (adminState.view === 'login') {
    app.innerHTML = renderLogin();
  } else {
    app.innerHTML = renderAdmin();
  }
  
  bindAdminEvents();
  
  if (adminState.toast) {
    setTimeout(() => { adminState.toast = null; render(); }, 3000);
  }
  
  // Scroll messages
  const msgs = document.getElementById('admin-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function renderLogin() {
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="admin-logo">ConnectGlobal</div>
      <div class="admin-badge">🔐 Admin Access Only</div>
      
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="admin-user" type="text" placeholder="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="admin-pass" type="password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="doAdminLogin()">Access Dashboard →</button>
      <p style="text-align:center;color:var(--muted);font-size:11px;margin-top:14px;">Authorized personnel only</p>
    </div>
  </div>
  `;
}

function renderAdmin() {
  const totalRevenue = adminState.transactions.filter(t=>t.status==='completed').length * 100;
  const activeUsers = adminState.users.filter(u=>u.status==='active').length;
  const totalConvs = Object.keys(adminState.conversations).length;
  
  return `
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-title">CG Admin</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;">Control Panel</div>
      </div>
      
      <div class="nav-section">Main</div>
      <button class="nav-link ${adminState.page==='overview'?'active':''}" onclick="setPage('overview')">
        <span>📊</span> Overview
      </button>
      <button class="nav-link ${adminState.page==='messages'?'active':''}" onclick="setPage('messages')">
        <span>💬</span> Messages
        <span class="badge">${Object.keys(adminState.conversations).length}</span>
      </button>
      
      <div class="nav-section">Management</div>
      <button class="nav-link ${adminState.page==='users'?'active':''}" onclick="setPage('users')">
        <span>👥</span> Users
        <span style="margin-left:auto;font-size:11px;color:var(--muted);">${adminState.users.length}</span>
      </button>
      <button class="nav-link ${adminState.page==='profiles'?'active':''}" onclick="setPage('profiles')">
        <span>🌍</span> Profiles
        <span style="margin-left:auto;font-size:11px;color:var(--muted);">50</span>
      </button>
      <button class="nav-link ${adminState.page==='transactions'?'active':''}" onclick="setPage('transactions')">
        <span>💰</span> Transactions
      </button>
      <button class="nav-link ${adminState.page==='analytics'?'active':''}" onclick="setPage('analytics')">
        <span>📈</span> Analytics
      </button>
      
      <div style="margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Logged in as Admin</div>
        <button class="nav-link" onclick="doAdminLogout()" style="padding:8px 0;color:var(--danger);">
          🚪 Logout
        </button>
      </div>
    </aside>
    
    <main class="admin-main">
      ${adminState.page==='overview' ? renderOverview(totalRevenue, activeUsers, totalConvs) : ''}
      ${adminState.page==='messages' ? renderMessages() : ''}
      ${adminState.page==='users' ? renderUsers() : ''}
      ${adminState.page==='profiles' ? renderProfiles() : ''}
      ${adminState.page==='transactions' ? renderTransactions() : ''}
      ${adminState.page==='analytics' ? renderAnalytics(totalRevenue) : ''}
    </main>
    
    ${adminState.modal ? renderModal() : ''}
    ${adminState.toast ? `<div class="toast">${adminState.toast}</div>` : ''}
  </div>
  `;
}

function renderOverview(revenue, activeUsers, convs) {
  return `
  <div>
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard Overview</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">Last updated: ${new Date().toLocaleString()}</div>
      </div>
      <div style="font-size:11px;background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.3);color:#34d399;padding:6px 14px;border-radius:100px;">
        ● System Online
      </div>
    </div>
    
    ${adminState.pendingUnlocks.length > 0 ? `
    <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.35);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;">
      <div style="font-size:22px;">🔔</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;color:#fbbf24;">${adminState.pendingUnlocks.length} payment${adminState.pendingUnlocks.length>1?'s':''} pending confirmation</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${adminState.pendingUnlocks.map(p=>p.userName).join(', ')} — verify M-Pesa and unlock</div>
      </div>
      <button onclick="setPage('users')" style="background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.4);color:#fbbf24;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">Manage →</button>
    </div>
    ` : ''}
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${adminState.users.length}</div>
        <div class="stat-label">Total Users</div>
        <div class="stat-change">▲ ${activeUsers} active now</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${convs}</div>
        <div class="stat-label">Conversations</div>
        <div class="stat-change">▲ Active chats</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-value">KSh ${revenue}</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-change">▲ ${adminState.transactions.filter(t=>t.status==='completed').length} payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌍</div>
        <div class="stat-value">50</div>
        <div class="stat-label">Active Profiles</div>
        <div class="stat-change">▲ All countries</div>
      </div>
    </div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Recent Messages</div>
          <button onclick="setPage('messages')" style="font-size:12px;color:var(--accent2);background:none;border:none;cursor:pointer;">View all →</button>
        </div>
        <table>
          <thead><tr><th>User</th><th>Profile</th><th>Messages</th></tr></thead>
          <tbody>
            ${Object.values(adminState.conversations).slice(0, 5).map(c => `
            <tr style="cursor:pointer;" onclick="setPage('messages');adminState.activeConv='${Object.keys(adminState.conversations).find(k=>adminState.conversations[k]===c)}';render()">
              <td><div class="user-cell"><span>${c.userName}</span></div></td>
              <td style="color:var(--accent2);">${c.profileName}</td>
              <td>${c.messages.length}</td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Recent Transactions</div>
          <button onclick="setPage('transactions')" style="font-size:12px;color:var(--accent2);background:none;border:none;cursor:pointer;">View all →</button>
        </div>
        <table>
          <thead><tr><th>User</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody>
            ${adminState.transactions.slice(0,5).map(t => `
            <tr>
              <td>${t.user}</td>
              <td style="font-weight:600;">KSh ${t.amount}</td>
              <td><span class="status-badge ${t.status==='completed'?'active':'inactive'}">${t.status}</span></td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  `;
}

function renderMessages() {
  const convKeys = Object.keys(adminState.conversations);
  
  return `
  <div>
    <div class="page-header">
      <div class="page-title">Message Management</div>
      <div style="font-size:12px;color:var(--muted);">Reply to users as their matched profiles</div>
    </div>
    
    <div class="chat-panel">
      <div class="conv-list">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">
          Active Conversations (${convKeys.length})
        </div>
        ${convKeys.map(key => {
          const c = adminState.conversations[key];
          const last = c.messages[c.messages.length-1];
          return `
          <div class="conv-item ${adminState.activeConv===key?'active':''}" onclick="adminState.activeConv='${key}';render()">
            <div style="flex:1;min-width:0;">
              <div class="conv-name">${c.userName}</div>
              <div style="font-size:10px;color:var(--accent2);">as ${c.profileName}</div>
              <div class="conv-preview">${last?.content || 'No messages'}</div>
            </div>
          </div>
          `;
        }).join('')}
        ${convKeys.length === 0 ? '<div class="empty-state"><div class="empty-icon">💬</div><p>No conversations yet</p></div>' : ''}
      </div>
      
      ${adminState.activeConv ? renderReplyPanel() : `
        <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);">
          <div style="font-size:48px;opacity:0.3;">💬</div>
          <div>Select a conversation to reply</div>
        </div>
      `}
    </div>
  </div>
  `;
}

function renderReplyPanel() {
  const conv = adminState.conversations[adminState.activeConv];
  if (!conv) return '';
  
  return `
  <div class="reply-panel">
    <div class="reply-header">
      <div>
        <div style="font-size:13px;font-weight:600;">Replying as ${conv.profileName}</div>
        <div style="font-size:11px;color:var(--muted);">to ${conv.userName}</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--success);">● Live</div>
    </div>
    
    <div class="reply-messages" id="admin-messages">
      ${conv.messages.map(m => `
      <div class="msg-bubble ${m.role==='user'?'user':'admin'}">
        <div style="font-size:10px;margin-bottom:4px;opacity:0.6;">${m.role==='user'?conv.userName:conv.profileName} · ${formatAdminTime(m.time)}</div>
        ${m.content}
      </div>
      `).join('')}
    </div>
    
    <div class="reply-input-area">
      <textarea class="reply-input" id="admin-reply-input" placeholder="Type reply as ${conv.profileName}..." rows="2"
        onkeydown="handleAdminKey(event)"></textarea>
      <button class="send-btn" onclick="sendAdminReply()">Send Reply ↑</button>
    </div>
  </div>
  `;
}

function renderUsers() {
  const filtered = adminState.users.filter(u => 
    !adminState.search || 
    u.name.toLowerCase().includes(adminState.search.toLowerCase()) ||
    u.email.toLowerCase().includes(adminState.search.toLowerCase())
  );
  
  return `
  <div>
    <div class="page-header">
      <div class="page-title">User Management</div>
      <input class="search-input" placeholder="Search users..." value="${adminState.search}" 
        oninput="adminState.search=this.value;render()">
    </div>

    ${adminState.pendingUnlocks.length > 0 ? `
    <div style="margin-bottom:20px;">
      <div style="font-weight:600;font-size:14px;margin-bottom:10px;color:#fbbf24;">🔔 Pending Payment Confirmations (${adminState.pendingUnlocks.length})</div>
      <div class="table-card">
        <table>
          <thead><tr><th>User</th><th>Phone</th><th>Amount</th><th>Requested</th><th>Action</th></tr></thead>
          <tbody>
            ${adminState.pendingUnlocks.map((p,i) => `
            <tr>
              <td style="font-weight:600;">${p.userName}</td>
              <td style="font-size:12px;color:var(--muted);">+254${p.phone}</td>
              <td style="font-weight:700;color:var(--gold);">KSh 100</td>
              <td style="font-size:12px;color:var(--muted);">${formatAdminTime(p.time)}</td>
              <td>
                <button class="action-btn success" onclick="confirmUnlock(${i})">✅ Confirm & Unlock</button>
                <button class="action-btn danger" onclick="rejectUnlock(${i})">✕ Reject</button>
              </td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}
    
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Messages</th>
            <th>Balance (USD)</th>
            <th>Access</th>
            <th>Last Active</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.length === 0 ? `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted);">No users yet. Users appear here when they sign up.</td></tr>` : ''}
          ${filtered.map(u => `
          <tr>
            <td>
              <div class="user-cell">
                <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;">
                  ${u.name[0]}
                </div>
                <div>
                  <div style="font-weight:600;font-size:13px;">${u.name}</div>
                  <div style="font-size:11px;color:var(--muted);">${u.email}</div>
                </div>
              </div>
            </td>
            <td style="font-size:12px;color:var(--muted);">${u.phone}</td>
            <td><span class="status-badge ${u.status}">${u.status}</span></td>
            <td><span style="font-weight:600;">${u.msgCount}</span></td>
            <td>
              <span style="font-weight:700;color:var(--success);">$${u.balance.toFixed(2)}</span>
            </td>
            <td>
              ${adminState.unlockedUsers[u.id] 
                ? '<span class="status-badge unlocked">✓ Unlocked</span>' 
                : '<span class="status-badge inactive">Locked</span>'}
            </td>
            <td style="font-size:12px;color:var(--muted);">${u.lastActive}</td>
            <td>
              <button class="action-btn edit" onclick="showEditUser(${u.id})">Edit</button>
              <button class="action-btn danger" onclick="toggleUserStatus(${u.id})">${u.status==='active'?'Suspend':'Activate'}</button>
            </td>
          </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}

function renderProfiles() {
  return `
  <div>
    <div class="page-header">
      <div class="page-title">Profile Management</div>
      <div style="font-size:12px;color:var(--muted);">50 profiles active</div>
    </div>
    <div class="table-card">
      <table>
        <thead><tr><th>Name</th><th>Country</th><th>Status</th><th>Views</th><th>Matches</th><th>Actions</th></tr></thead>
        <tbody>
          <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);">Profile data coming soon</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  `;
}

function renderTransactions() {
  return `
  <div>
    <div class="page-header">
      <div class="page-title">Transaction Management</div>
      <div style="font-size:12px;color:var(--muted);">All payment records</div>
    </div>
    <div class="table-card">
      <table>
        <thead><tr><th>User</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody>
          ${adminState.transactions.length === 0 ? `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);">No transactions yet</td></tr>` : ''}
          ${adminState.transactions.map(t => `
          <tr>
            <td>${t.user}</td>
            <td style="font-weight:600;">KSh ${t.amount}</td>
            <td>${t.method || 'M-Pesa'}</td>
            <td><span class="status-badge ${t.status==='completed'?'active':'inactive'}">${t.status}</span></td>
            <td>${formatAdminTime(t.date)}</td>
            <td><button class="action-btn edit">Details</button></td>
          </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}

function renderAnalytics(revenue) {
  return `
  <div>
    <div class="page-header">
      <div class="page-title">Analytics & Insights</div>
      <div style="font-size:12px;color:var(--muted);">Platform metrics</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value">${adminState.users.length}</div>
        <div class="stat-label">Total Users</div>
        <div class="stat-change">▲ Growth</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${Object.keys(adminState.conversations).length}</div>
        <div class="stat-label">Conversations</div>
        <div class="stat-change">▲ Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-value">KSh ${revenue}</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-change">▲ Monthly</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-value">4.8</div>
        <div class="stat-label">Avg Rating</div>
        <div class="stat-change">▲ From users</div>
      </div>
    </div>
  </div>
  `;
}

function renderModal() {
  if (!adminState.modal) return '';
  const m = adminState.modal;
  
  if (m.type === 'editUser') {
    return `
    <div class="modal-overlay" onclick="adminState.modal=null;render()">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-title">Edit User</div>
        <div class="input-group">
          <label class="input-label">User ID</label>
          <input class="form-input" readonly value="${m.data.id}">
        </div>
        <div class="modal-actions">
          <button class="btn-modal btn-cancel" onclick="adminState.modal=null;render()">Cancel</button>
          <button class="btn-modal btn-confirm" onclick="adminState.modal=null;render()">Save</button>
        </div>
      </div>
    </div>
    `;
  }
  return '';
}

// ============================================================
// FUNCTIONS
// ============================================================
function doAdminLogin() {
  const userInput = document.getElementById('admin-user').value;
  const passInput = document.getElementById('admin-pass').value;
  
  if (userInput === ADMIN_CREDS.user && passInput === ADMIN_CREDS.pass) {
    adminState.view = 'admin';
    adminState.page = 'overview';
    adminState.toast = '✅ Login successful';
    render();
  } else {
    adminState.toast = '❌ Invalid credentials';
    render();
  }
}

function doAdminLogout() {
  adminState.view = 'login';
  adminState.users = [];
  adminState.conversations = {};
  adminState.transactions = [];
  adminState.pendingUnlocks = [];
  adminState.page = 'overview';
  render();
}

function setPage(page) {
  adminState.page = page;
  render();
}

function bindAdminEvents() {
  // Event binding can be added here as needed
}

function formatAdminTime(time) {
  if (!time) return 'N/A';
  return new Date(time).toLocaleTimeString();
}

function sendAdminReply() {
  const input = document.getElementById('admin-reply-input');
  if (!input || !input.value.trim()) return;
  
  const conv = adminState.conversations[adminState.activeConv];
  if (!conv) return;
  
  conv.messages.push({
    role: 'admin',
    content: input.value,
    time: new Date().toISOString()
  });
  
  input.value = '';
  adminState.toast = '✅ Message sent';
  render();
}

function handleAdminKey(event) {
  if (event.key === 'Enter' && event.ctrlKey) {
    sendAdminReply();
  }
}

function showEditUser(userId) {
  const user = adminState.users.find(u => u.id === userId);
  if (!user) return;
  adminState.modal = { type: 'editUser', data: user };
  render();
}

function showEditBalance(userId) {
  const user = adminState.users.find(u => u.id === userId);
  if (!user) return;
  const newBalance = prompt('Enter new balance (USD):', user.balance);
  if (newBalance !== null) {
    user.balance = parseFloat(newBalance) || 0;
    adminState.toast = '✅ Balance updated';
    render();
  }
}

function toggleUserStatus(userId) {
  const user = adminState.users.find(u => u.id === userId);
  if (!user) return;
  user.status = user.status === 'active' ? 'suspended' : 'active';
  adminState.toast = `✅ User ${user.status}`;
  render();
}

function grantAccess(userId) {
  adminState.unlockedUsers[userId] = true;
  adminState.toast = '✅ Access granted';
  render();
}

function revokeAccess(userId) {
  adminState.unlockedUsers[userId] = false;
  adminState.toast = '✅ Access revoked';
  render();
}

function confirmUnlock(index) {
  const unlock = adminState.pendingUnlocks[index];
  if (!unlock) return;
  adminState.unlockedUsers[unlock.userId] = true;
  adminState.pendingUnlocks.splice(index, 1);
  adminState.toast = `✅ ${unlock.userName} unlocked`;
  render();
}

function rejectUnlock(index) {
  adminState.pendingUnlocks.splice(index, 1);
  adminState.toast = '❌ Unlock rejected';
  render();
}

// Initialize
render();
</script>
</body>
</html>

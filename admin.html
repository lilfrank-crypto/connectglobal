<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectGlobal — Admin Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #060608;
    --surface: #10101a;
    --surface2: #18182a;
    --border: #252538;
    --accent: #6d28d9;
    --accent2: #8b5cf6;
    --danger: #dc2626;
    --success: #059669;
    --gold: #d97706;
    --text: #e2e2f0;
    --muted: #6b7280;
    --radius: 14px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(109,40,217,0.12) 0%, transparent 70%);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .admin-logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .admin-badge {
    display: inline-block;
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #f87171;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent2); }

  .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-top: 6px;
  }

  .btn:hover { filter: brightness(1.1); }

  /* ADMIN LAYOUT */
  .admin-layout {
    display: flex;
    min-height: 100vh;
  }

  .admin-sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
    overflow-y: auto;
  }

  .admin-sidebar::-webkit-scrollbar { display: none; }

  .sidebar-logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    border-radius: 0;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }

  .nav-link:hover { background: var(--surface2); color: var(--text); }
  .nav-link.active { background: rgba(109,40,217,0.15); color: #a78bfa; border-left: 2px solid var(--accent2); }

  .nav-section {
    padding: 12px 20px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--border);
    font-weight: 600;
  }

  .badge {
    background: var(--danger);
    color: white;
    border-radius: 100px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
    margin-left: auto;
  }

  /* MAIN */
  .admin-main {
    margin-left: 240px;
    flex: 1;
    padding: 28px;
    min-height: 100vh;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stat-icon { font-size: 24px; margin-bottom: 10px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-change { font-size: 11px; color: var(--success); margin-top: 6px; }

  /* TABLES */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title { font-weight: 600; font-size: 14px; }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid rgba(37,37,56,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(109,40,217,0.04); }

  .user-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar-sm {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .status-badge {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-badge.active { background: rgba(5,150,105,0.15); color: #34d399; }
  .status-badge.inactive { background: rgba(107,114,128,0.15); color: var(--muted); }
  .status-badge.unlocked { background: rgba(109,40,217,0.15); color: var(--accent2); }

  .action-btn {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    margin-right: 6px;
  }

  .action-btn.edit { background: rgba(109,40,217,0.15); color: var(--accent2); }
  .action-btn.danger { background: rgba(220,38,38,0.1); color: #f87171; }
  .action-btn.success { background: rgba(5,150,105,0.1); color: #34d399; }
  .action-btn:hover { filter: brightness(1.2); }

  /* CHAT PANEL */
  .chat-panel {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 600px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .conv-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .conv-list::-webkit-scrollbar { width: 4px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(37,37,56,0.5);
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: rgba(109,40,217,0.1); }

  .conv-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .conv-name { font-size: 13px; font-weight: 600; }
  .conv-preview { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

  /* REPLY PANEL */
  .reply-panel {
    display: flex;
    flex-direction: column;
  }

  .reply-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
  }

  .reply-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .reply-messages::-webkit-scrollbar { width: 4px; }
  .reply-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg-bubble.user {
    background: rgba(109,40,217,0.2);
    border: 1px solid rgba(109,40,217,0.3);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg-bubble.admin {
    background: linear-gradient(135deg, rgba(109,40,217,0.4), rgba(139,92,246,0.4));
    border: 1px solid rgba(139,92,246,0.3);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .reply-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .reply-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
  }

  .reply-input:focus { border-color: var(--accent2); }

  .send-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
    animation: slideUp 0.2s;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .input-group { margin-bottom: 14px; }

  .input-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .btn-modal {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    border: none;
    transition: all 0.2s;
  }

  .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border) !important; color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    animation: slideUp 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    width: 200px;
  }

  .search-input:focus { border-color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* PROFILE LIST */
  .profiles-grid-admin {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .profile-admin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .profile-admin-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
  }

  .profile-admin-body { padding: 12px; }
  .profile-admin-name { font-weight: 600; font-size: 13px; }
  .profile-admin-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .profile-admin-actions { display: flex; gap: 6px; margin-top: 10px; }
</style>
</head>
<body>
<div id="admin-app"></div>

<script>
// ============================================================
// ADMIN STATE
// ============================================================
let adminState = {
  view: 'login',
  page: 'overview',  // overview | users | messages | profiles | transactions | analytics
  
  users: [],
  conversations: {},
  transactions: [],

  pendingUnlocks: [], // { userId, userName, phone, time } — users who paid, waiting for admin unlock
  unlockedUsers: {}, // userId -> true

  activeConv: null,
  replyText: '',
  modal: null, // { type, data }
  toast: null,
  search: '',
  editUser: null,  // user being edited in modal
};

const ADMIN_CREDS = { user: 'admin', pass: 'franklink.01' };

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('admin-app');
  
  if (adminState.view === 'login') {
    app.innerHTML = renderLogin();
  } else {
    app.innerHTML = renderAdmin();
  }
  
  bindAdminEvents();
  
  if (adminState.toast) {
    setTimeout(() => { adminState.toast = null; render(); }, 3000);
  }
  
  // Scroll messages
  const msgs = document.getElementById('admin-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function renderLogin() {
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="admin-logo">ConnectGlobal</div>
      <div class="admin-badge">🔐 Admin Access Only</div>
      
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="admin-user" type="text" placeholder="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="admin-pass" type="password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="doAdminLogin()">Access Dashboard →</button>
      <p style="text-align:center;color:var(--muted);font-size:11px;margin-top:14px;">Authorized personnel only</p>
    </div>
  </div>
  `;
}

function renderAdmin() {
  const totalRevenue = adminState.transactions.filter(t=>t.status==='completed').length * 100;
  const activeUsers = adminState.users.filter(u=>u.status==='active').length;
  const totalConvs = Object.keys(adminState.conversations).length;
  
  return `
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-title">CG Admin</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;">Control Panel</div>
      </div>
      
      <div class="nav-section">Main</div>
      <button class="nav-link ${adminState.page==='overview'?'active':''}" onclick="setPage('overview')">
        <span>📊</span> Overview
      </button>
      <button class="nav-link ${adminState.page==='messages'?'active':''}" onclick="setPage('messages')">
        <span>💬</span> Messages
        <span class="badge">${Object.keys(adminState.conversations).length}</span>
      </button>
      
      <div class="nav-section">Management</div>
      <button class="nav-link ${adminState.page==='users'?'active':''}" onclick="setPage('users')">
        <span>👥</span> Users
        <span style="margin-left:auto;font-size:11px;color:var(--muted);">${adminState.users.length}</span>
      </button>
      <button class="nav-link ${adminState.page==='profiles'?'active':''}" onclick="setPage('profiles')">
        <span>🌍</span> Profiles
        <span style="margin-left:auto;font-size:11px;color:var(--muted);">50</span>
      </button>
      <button class="nav-link ${adminState.page==='transactions'?'active':''}" onclick="setPage('transactions')">
        <span>💰</span> Transactions
      </button>
      <button class="nav-link ${adminState.page==='analytics'?'active':''}" onclick="setPage('analytics')">
        <span>📈</span> Analytics
      </button>
      
      <div style="margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Logged in as Admin</div>
        <button class="nav-link" onclick="doAdminLogout()" style="padding:8px 0;color:var(--danger);">
          🚪 Logout
        </button>
      </div>
    </aside>
    
    <main class="admin-main">
      ${adminState.page==='overview' ? renderOverview(totalRevenue, activeUsers, totalConvs) : ''}
      ${adminState.page==='messages' ? renderMessages() : ''}
      ${adminState.page==='users' ? renderUsers() : ''}
      ${adminState.page==='profiles' ? renderProfiles() : ''}
      ${adminState.page==='transactions' ? renderTransactions() : ''}
      ${adminState.page==='analytics' ? renderAnalytics(totalRevenue) : ''}
    </main>
    
    ${adminState.modal ? renderModal() : ''}
    ${adminState.toast ? `<div class="toast">${adminState.toast}</div>` : ''}
  </div>
  `;
}

function renderOverview(revenue, activeUsers, convs) {
  return `
  <div>
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard Overview</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">Last updated: ${new Date().toLocaleString()}</div>
      </div>
      <div style="font-size:11px;background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.3);color:#34d399;padding:6px 14px;border-radius:100px;">
        ● System Online
      </div>
    </div>
    
    ${adminState.pendingUnlocks.length > 0 ? `
    <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.35);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;">
      <div style="font-size:22px;">🔔</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;color:#fbbf24;">${adminState.pendingUnlocks.length} payment${adminState.pendingUnlocks.length>1?'s':''} pending confirmation</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${adminState.pendingUnlocks.map(p=>p.userName).join(', ')} — verify M-Pesa and unlock</div>
      </div>
      <button onclick="setPage('users')" style="background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.4);color:#fbbf24;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Review →</button>
    </div>
    ` : ''}
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${adminState.users.length}</div>
        <div class="stat-label">Total Users</div>
        <div class="stat-change">▲ ${activeUsers} active now</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${convs}</div>
        <div class="stat-label">Conversations</div>
        <div class="stat-change">▲ Active chats</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-value">KSh ${revenue}</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-change">▲ ${adminState.transactions.filter(t=>t.status==='completed').length} payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌍</div>
        <div class="stat-value">50</div>
        <div class="stat-label">Active Profiles</div>
        <div class="stat-change">▲ All countries</div>
      </div>
    </div>

function sendAdminReply() {
  const input = document.getElementById('admin-reply-input');
  const text = input?.value?.trim();
  if (!text || !adminState.activeConv) return;

  const conv = adminState.conversations[adminState.activeConv];
  if (!conv) return;

  const newMsg = { role: 'assistant', content: text, time: new Date().toISOString() };
  conv.messages.push(newMsg);

  // Write reply back to localStorage so the user app picks it up instantly
  try {
    const key = adminState.activeConv;
    const stored = JSON.parse(localStorage.getItem(key) || '{}');
    stored.messages = conv.messages;
    stored.lastUpdated = new Date().toISOString();
    localStorage.setItem(key, JSON.stringify(stored));
  } catch(e) { console.log('Storage write error:', e); }

  input.value = '';
  showAdminToast('Reply sent!');
  render();
}

function handleAdminKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAdminReply();
  }
}

function confirmUnlock(index) {
  const pending = adminState.pendingUnlocks[index];
  if (!pending) return;

  // Grant access in admin state
  adminState.unlockedUsers[pending.userId] = true;

  // Write unlock to localStorage so user's app polling picks it up
  try {
    const unlocks = JSON.parse(localStorage.getItem('cg_unlocked_users') || '{}');
    unlocks[pending.userId] = true;
    localStorage.setItem('cg_unlocked_users', JSON.stringify(unlocks));

    // Remove from pending unlocks in localStorage
    const stored = JSON.parse(localStorage.getItem('cg_pending_unlocks') || '[]');
    const updated = stored.filter(p => p.userId !== pending.userId);
    localStorage.setItem('cg_pending_unlocks', JSON.stringify(updated));
  } catch(e) {}

  // Log as completed transaction
  adminState.transactions.unshift({
    id: 'TXN' + String(adminState.transactions.length + 1).padStart(3,'0'),
    user: pending.userName,
    phone: '+254' + pending.phone,
    amount: 100,
    currency: 'KES',
    status: 'completed',
    ref: 'CG-' + pending.userName.split(' ')[0].toUpperCase() + '-' + Date.now(),
    time: new Date()
  });

  adminState.pendingUnlocks.splice(index, 1);
  showAdminToast('Unlocked ' + pending.userName + ' successfully!');
  render();
}

function rejectUnlock(index) {
  const pending = adminState.pendingUnlocks[index];
  if (!pending) return;
  adminState.pendingUnlocks.splice(index, 1);
  showAdminToast(`✕ Payment rejected for ${pending.userName}`);
  render();
}

function grantAccess(userId) {
  adminState.unlockedUsers[userId] = true;
  try {
    const unlocks = JSON.parse(localStorage.getItem('cg_unlocked_users') || '{}');
    unlocks[userId] = true;
    localStorage.setItem('cg_unlocked_users', JSON.stringify(unlocks));
  } catch(e) {}
  const user = adminState.users.find(u=>u.id===userId);
  showAdminToast('Full access granted to ' + (user?.name || userId));
  render();
}

function revokeAccess(userId) {
  delete adminState.unlockedUsers[userId];
  try {
    const unlocks = JSON.parse(localStorage.getItem('cg_unlocked_users') || '{}');
    delete unlocks[userId];
    localStorage.setItem('cg_unlocked_users', JSON.stringify(unlocks));
  } catch(e) {}
  const user = adminState.users.find(u=>u.id===userId);
  showAdminToast('Access revoked for ' + (user?.name || userId));
  render();
}

function saveProfileEdit(profileId) {
  const name = document.getElementById('ep-name')?.value?.trim();
  const age = document.getElementById('ep-age')?.value;
  const city = document.getElementById('ep-city')?.value?.trim();
  const country = document.getElementById('ep-country')?.value?.trim();
  const bio = document.getElementById('ep-bio')?.value?.trim();
  const interests = document.getElementById('ep-interests')?.value?.trim();
  const photo = document.getElementById('ep-photo')?.value?.trim();

  // Save edits to localStorage so app.html picks them up
  try {
    const edits = JSON.parse(localStorage.getItem('cg_profile_edits') || '{}');
    edits[profileId] = { name, age: parseInt(age), city, country, bio, interests, photo };
    localStorage.setItem('cg_profile_edits', JSON.stringify(edits));
  } catch(e) {}

  showAdminToast(`Profile for ${name} saved!`);
  adminState.modal = null;
  render();
}

function loadFromStorage() {
  // Load conversations from localStorage
  try {
    const index = JSON.parse(localStorage.getItem('cg_conv_index') || '[]');
    index.forEach(key => {
      const conv = JSON.parse(localStorage.getItem(key) || 'null');
      if (conv && conv.messages && conv.messages.length > 0) {
        adminState.conversations[key] = conv;
        // Register user if not already in list
        const exists = adminState.users.find(u => u.email === conv.userEmail);
        if (!exists) {
          adminState.users.push({
            id: adminState.users.length + 1,
            name: conv.userName,
            email: conv.userEmail,
            phone: 'N/A',
            joined: new Date().toLocaleDateString(),
            status: 'active',
            balance: 0,
            msgCount: conv.messages.filter(m=>m.role==='user').length,
            unlockedCount: 0,
            lastActive: 'Just now'
          });
        } else {
          exists.msgCount = conv.messages.filter(m=>m.role==='user').length;
          exists.lastActive = 'Recently';
        }
      }
    });
  } catch(e) { console.log('Load error:', e); }

  // Load pending unlocks from localStorage
  try {
    const pending = JSON.parse(localStorage.getItem('cg_pending_unlocks') || '[]');
    pending.forEach(p => {
      const alreadyIn = adminState.pendingUnlocks.find(x => x.userId === p.userId);
      if (!alreadyIn) adminState.pendingUnlocks.push(p);
    });
  } catch(e) {}
}

// Poll localStorage every 4 seconds for new messages and pending unlocks
setInterval(() => {
  const prevConvCount = Object.keys(adminState.conversations).length;
  const prevPendingCount = adminState.pendingUnlocks.length;
  loadFromStorage();
  const newConvCount = Object.keys(adminState.conversations).length;
  const newPendingCount = adminState.pendingUnlocks.length;
  if (newConvCount !== prevConvCount || newPendingCount !== prevPendingCount) {
    render();
  }
}, 4000);

function showAdminToast(msg) {
  adminState.toast = msg;
}

function formatAdminTime(date) {
  if (!date) return '';
  const d = new Date(date);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + ' mins ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' hours ago';
  return d.toLocaleDateString();
}

function bindAdminEvents() {}

// INIT
loadFromStorage();
render();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectGlobal — Admin Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #060608;
    --surface: #10101a;
    --surface2: #18182a;
    --border: #252538;
    --accent: #6d28d9;
    --accent2: #8b5cf6;
    --danger: #dc2626;
    --success: #059669;
    --gold: #d97706;
    --text: #e2e2f0;
    --muted: #6b7280;
    --radius: 14px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(109,40,217,0.12) 0%, transparent 70%);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .admin-logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .admin-badge {
    display: inline-block;
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #f87171;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent2); }

  .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-top: 6px;
  }

  .btn:hover { filter: brightness(1.1); }

  /* ADMIN LAYOUT */
  .admin-layout {
    display: flex;
    min-height: 100vh;
  }

  .admin-sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
    overflow-y: auto;
  }

  .admin-sidebar::-webkit-scrollbar { display: none; }

  .sidebar-logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    border-radius: 0;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }

  .nav-link:hover { background: var(--surface2); color: var(--text); }
  .nav-link.active { background: rgba(109,40,217,0.15); color: #a78bfa; border-left: 2px solid var(--accent2); }

  .nav-section {
    padding: 12px 20px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--border);
    font-weight: 600;
  }

  .badge {
    background: var(--danger);
    color: white;
    border-radius: 100px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
    margin-left: auto;
  }

  /* MAIN */
  .admin-main {
    margin-left: 240px;
    flex: 1;
    padding: 28px;
    min-height: 100vh;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stat-icon { font-size: 24px; margin-bottom: 10px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-change { font-size: 11px; color: var(--success); margin-top: 6px; }

  /* TABLES */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title { font-weight: 600; font-size: 14px; }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid rgba(37,37,56,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(109,40,217,0.04); }

  .user-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar-sm {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .status-badge {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-badge.active { background: rgba(5,150,105,0.15); color: #34d399; }
  .status-badge.inactive { background: rgba(107,114,128,0.15); color: var(--muted); }
  .status-badge.unlocked { background: rgba(109,40,217,0.15); color: var(--accent2); }

  .action-btn {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    margin-right: 6px;
  }

  .action-btn.edit { background: rgba(109,40,217,0.15); color: var(--accent2); }
  .action-btn.danger { background: rgba(220,38,38,0.1); color: #f87171; }
  .action-btn.success { background: rgba(5,150,105,0.1); color: #34d399; }
  .action-btn:hover { filter: brightness(1.2); }

  /* CHAT PANEL */
  .chat-panel {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 600px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .conv-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .conv-list::-webkit-scrollbar { width: 4px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(37,37,56,0.5);
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: rgba(109,40,217,0.1); }

  .conv-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .conv-name { font-size: 13px; font-weight: 600; }
  .conv-preview { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

  /* REPLY PANEL */
  .reply-panel {
    display: flex;
    flex-direction: column;
  }

  .reply-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
  }

  .reply-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .reply-messages::-webkit-scrollbar { width: 4px; }
  .reply-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg-bubble.user {
    background: rgba(109,40,217,0.2);
    border: 1px solid rgba(109,40,217,0.3);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg-bubble.admin {
    background: linear-gradient(135deg, rgba(109,40,217,0.4), rgba(139,92,246,0.4));
    border: 1px solid rgba(139,92,246,0.3);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .reply-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .reply-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
  }

  .reply-input:focus { border-color: var(--accent2); }

  .send-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
    animation: slideUp 0.2s;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .input-group { margin-bottom: 14px; }

  .input-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .btn-modal {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    border: none;
    transition: all 0.2s;
  }

  .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border) !important; color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    animation: slideUp 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    width: 200px;
  }

  .search-input:focus { border-color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* PROFILE LIST */
  .profiles-grid-admin {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .profile-admin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .profile-admin-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
  }

  .profile-admin-body { padding: 12px; }
  .profile-admin-name { font-weight: 600; font-size: 13px; }
  .profile-admin-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .profile-admin-actions { display: flex; gap: 6px; margin-top: 10px; }

  /* ============================================================
     MOBILE RESPONSIVE
     ============================================================ */
  .admin-bottom-nav { display: none; }

  @media (max-width: 900px) {
    .admin-sidebar { display: none; }
    .admin-main { margin-left: 0; padding: 16px 14px 80px; }

    .admin-bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
    }

    .admin-bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      position: relative;
    }

    .admin-bottom-nav-item.active { color: var(--accent2); }
    .admin-bottom-nav-item .icon { font-size: 20px; }

    .admin-bottom-badge {
      position: absolute;
      top: 2px; right: 2px;
      width: 14px; height: 14px;
      background: var(--danger);
      border-radius: 50%;
      font-size: 8px;
      font-weight: 700;
      color: white;
      display: flex; align-items: center; justify-content: center;
    }

    .page-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .page-title { font-size: 18px; }

    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-card { padding: 14px; }
    .stat-value { font-size: 22px; }

    /* Tables: horizontal scroll on small screens */
    .table-card { overflow-x: auto; }
    table { min-width: 560px; }

    .search-input { width: 100%; }

    /* Chat panel stacks vertically */
    .chat-panel {
      grid-template-columns: 1fr;
      grid-template-rows: 240px 1fr;
      height: calc(100vh - 140px);
    }
    .conv-list { border-right: none; border-bottom: 1px solid var(--border); }

    /* Profile grid 2 columns */
    .profiles-grid-admin {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .profile-admin-photo { height: 120px; }

    /* Modal full width on mobile */
    .modal-card { max-width: 100% !important; padding: 20px; }
    .modal-actions { flex-direction: column; }
    .modal-actions .btn-modal { width: 100%; }

    /* Edit profile grid to single column */
    .modal-card div[style*="grid-template-columns:1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
  }

  @media (max-width: 480px) {
    .admin-main { padding: 12px 10px 80px; }
    .stat-icon { font-size: 18px; }
    .stat-value { font-size: 18px; }
    .stat-label { font-size: 10px; }
    .profiles-grid-admin { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }
</style>
</head>

<!-- Firebase SDK (Firestore for real-time sync across devices) -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getFirestore, collection, doc, setDoc, getDoc, getDocs,
    onSnapshot, query, orderBy, serverTimestamp, deleteDoc, updateDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCRpHTVqVPC_rX54auYGcIk3xy4yMOVQ2o",
    authDomain: "connectglobal-2458e.firebaseapp.com",
    projectId: "connectglobal-2458e",
    storageBucket: "connectglobal-2458e.firebasestorage.app",
    messagingSenderId: "272739449615",
    appId: "1:272739449615:web:7a1470c4ca332d9014dc7a"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);

  window.CGFirestore = {
    db,

    async saveConversation(userEmail, profileId, data) {
      const id = userEmail + '_' + profileId;
      await setDoc(doc(db, 'conversations', id), {
        ...data,
        userEmail,
        profileId: Number(profileId),
        updatedAt: serverTimestamp()
      }, { merge: true });
    },

    listenConversation(userEmail, profileId, callback) {
      const id = userEmail + '_' + profileId;
      return onSnapshot(doc(db, 'conversations', id), (snap) => {
        callback(snap.exists() ? snap.data() : null);
      });
    },

    listenAllConversations(callback) {
      return onSnapshot(collection(db, 'conversations'), (snap) => {
        const convs = {};
        snap.forEach(d => { convs[d.id] = d.data(); });
        callback(convs);
      });
    },

    async addPendingUnlock(data) {
      const id = data.userId + '_' + Date.now();
      await setDoc(doc(db, 'pendingUnlocks', id), {
        ...data,
        createdAt: serverTimestamp()
      });
    },

    listenPendingUnlocks(callback) {
      return onSnapshot(collection(db, 'pendingUnlocks'), (snap) => {
        const items = [];
        snap.forEach(d => items.push({ _id: d.id, ...d.data() }));
        callback(items);
      });
    },

    async removePendingUnlock(docId) {
      await deleteDoc(doc(db, 'pendingUnlocks', docId));
    },

    async setUnlocked(userEmail, value) {
      await setDoc(doc(db, 'unlockedUsers', userEmail), { unlocked: value });
    },

    listenUnlocked(userEmail, callback) {
      return onSnapshot(doc(db, 'unlockedUsers', userEmail), (snap) => {
        callback(snap.exists() ? snap.data().unlocked : false);
      });
    },

    listenAllUnlocked(callback) {
      return onSnapshot(collection(db, 'unlockedUsers'), (snap) => {
        const result = {};
        snap.forEach(d => { result[d.id] = d.data().unlocked; });
        callback(result);
      });
    },

    async saveProfileEdit(profileId, data) {
      await setDoc(doc(db, 'profileEdits', String(profileId)), data);
    },

    async deleteProfileEdit(profileId) {
      await deleteDoc(doc(db, 'profileEdits', String(profileId)));
    },

    listenProfileEdits(callback) {
      return onSnapshot(collection(db, 'profileEdits'), (snap) => {
        const edits = {};
        snap.forEach(d => { edits[d.id] = d.data(); });
        callback(edits);
      });
    },

    async addTransaction(data) {
      const id = 'TXN_' + Date.now();
      await setDoc(doc(db, 'transactions', id), {
        ...data,
        createdAt: serverTimestamp()
      });
    },

    listenTransactions(callback) {
      return onSnapshot(collection(db, 'transactions'), (snap) => {
        const items = [];
        snap.forEach(d => items.push({ _id: d.id, ...d.data() }));
        callback(items);
      });
    },

    listenReferrals(callback) {
      return onSnapshot(collection(db, 'referrals'), (snap) => {
        const items = [];
        snap.forEach(d => items.push({ _id: d.id, ...d.data() }));
        callback(items);
      });
    }
  };

  window.dispatchEvent(new Event('cgFirebaseReady'));
</script>

<script>
// ============================================================
// SAFE STORAGE — never throws, falls back to in-memory if blocked
// ============================================================
const memoryStore = {};
const safeStorage = {
  getItem(key) {
    try { return localStorage.getItem(key); }
    catch(e) { return memoryStore[key] ?? null; }
  },
  setItem(key, val) {
    try { localStorage.setItem(key, val); }
    catch(e) { memoryStore[key] = val; }
  }
};

// ============================================================
// ADMIN STATE
// ============================================================
let adminState = {
  view: 'login',
  page: 'overview',  // overview | users | messages | profiles | transactions | analytics
  
  users: [],
  conversations: {},
  transactions: [],
  referrals: [],

  pendingUnlocks: [], // { userId, userName, phone, time } — users who paid, waiting for admin unlock
  unlockedUsers: {}, // userId -> true

  activeConv: null,
  replyText: '',
  modal: null, // { type, data }
  toast: null,
  search: '',
  editUser: null,  // user being edited in modal
};

const ADMIN_CREDS = { user: 'admin', pass: 'franklink.01' };

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('admin-app');
  
  if (adminState.view === 'login') {
    app.innerHTML = renderLogin();
  } else {
    app.innerHTML = renderAdmin();
  }
  
  bindAdminEvents();
  
  if (adminState.toast) {
    setTimeout(() => { adminState.toast = null; render(); }, 3000);
  }
  
  // Scroll messages
  const msgs = document.getElementById('admin-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function renderLogin() {
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="admin-logo">ConnectGlobal</div>
      <div class="admin-badge">🔐 Admin Access Only</div>
      
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="admin-user" type="text" placeholder="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="admin-pass" type="password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="doAdminLogin()">Access Dashboard →</button>
      <p style="text-align:center;color:var(--muted);font-size:11px;margin-top:14px;">Authorized personnel only</p>
    </div>
  </div>
  `;
}

function renderAdmin() {
  const totalRevenue = adminState.transactions.filter(t=>t.status==='completed').length * 100;
  const activeUsers = adminState.users.filter(u=>u.status==='active').length;
  const totalConvs = Object.keys(adminState.conversations).length;
  
  return `
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-title">CG Admin</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;">Control Panel</div>
      </div>
      
      <div class="nav-section">Main</div>
      <button class="nav-link ${adminState.page==='overview'?'active':''}" onclick="setPage('overview')">
        <span>📊</span> Overview

      <button class="nav-link ${adminState.page==='messages'?'active':''}" onclick="setPage('messages')">
        <span>💬</span> Messages
        <span class="badge">${Object.keys(adminState.conversations).length}</span>
      </button>
      
      <div class="nav-section">Management</div>
      <button class="nav-link ${adminState.page==='users'?'active':''}" onclick="setPage('users')">
        <span>👥</span> Users

      <button class="nav-link ${adminState.page==='profiles'?'active':''}" onclick="setPage('profiles')">

function renderMessages() {
  const convKeys = Object.keys(adminState.conversations);
  
  return `
  <div>
    <div class="page-header">
      <div class="page-title">Message Management</div>
      <div style="font-size:12px;color:var(--muted);">Reply to users as their matched profiles</div>
    </div>
    
    <div class="chat-panel">
      <div class="conv-list">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">
          Active Conversations (${convKeys.length})
        </div>
        ${convKeys.map(key => {
          const c = adminState.conversations[key];
          const last = c.messages[c.messages.length-1];
          return `
          <div class="conv-item ${adminState.activeConv===key?'active':''}" onclick="adminState.activeConv='${key}';render()">
            <img class="conv-avatar" src="${c.profilePhoto}" alt="${c.profileName}" onerror="this.style.display='none'">
            <div style="flex:1;min-width:0;">
              <div class="conv-name">${c.userName}</div>
              <div style="font-size:10px;color:var(--accent2);">as ${c.profileName}</div>
              <div class="conv-preview">${last?.content || 'No messages'}</div>
            </div>
          </div>
          `;
        }).join('')}
        ${convKeys.length === 0 ? '<div class="empty-state"><div class="empty-icon">💬</div><p>No conversations yet</p></div>' : ''}
      </div>
      
      ${adminState.activeConv ? renderReplyPanel() : `
        <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);">
          <div style="font-size:48px;opacity:0.3;">💬</div>
          <div>Select a conversation to reply</div>
        </div>
      `}
    </div>
  </div>
  `;
}

function renderReplyPanel() {
  const conv = adminState.conversations[adminState.activeConv];
  if (!conv) return '';
  
  return `
  <div class="reply-panel">
    <div class="reply-header">
      <img src="${conv.profilePhoto}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">
      <div>
        <div style="font-size:13px;font-weight:600;">Replying as ${conv.profileName}</div>
        <div style="font-size:11px;color:var(--muted);">to ${conv.userName}</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--success);">● Live</div>
    </div>
    
    <div class="reply-messages" id="admin-messages">
      ${conv.messages.map(m => `
      <div class="msg-bubble ${m.role==='user'?'user':'admin'}">
        <div style="font-size:10px;margin-bottom:4px;opacity:0.6;">${m.role==='user'?conv.userName:conv.profileName} · ${formatAdminTime(m.time)}</div>
        ${m.content}
      </div>
      `).join('')}
    </div>
    
    <div class="reply-input-area">
      <textarea class="reply-input" id="admin-reply-input" placeholder="Type reply as ${conv.profileName}..." rows="2"
        onkeydown="handleAdminKey(event)"></textarea>
      <button class="send-btn" onclick="sendAdminReply()">Send Reply ↑</button>
    </div>
  </div>
  `;
}

function renderUsers() {
  const filtered = adminState.users.filter(u => 
    !adminState.search || 
    u.name.toLowerCase().includes(adminState.search.toLowerCase()) ||
    u.email.toLowerCase().includes(adminState.search.toLowerCase())
  );
  
  return `
  <div>
    <div class="page-header">
      <div class="page-title">User Management</div>
      <input class="search-input" placeholder="Search users..." value="${adminState.search}" 
        oninput="adminState.search=this.value;render()">
    </div>

    ${adminState.pendingUnlocks.length > 0 ? `
    <div style="margin-bottom:20px;">
      <div style="font-weight:600;font-size:14px;margin-bottom:10px;color:#fbbf24;">🔔 Pending Payment Confirmations (${adminState.pendingUnlocks.length})</div>
      <div class="table-card">
        <table>
          <thead><tr><th>User</th><th>Phone</th><th>Amount</th><th>Requested</th><th>Action</th></tr></thead>
          <tbody>
            ${adminState.pendingUnlocks.map((p,i) => `
            <tr>
              <td style="font-weight:600;">${p.userName}</td>
              <td style="font-size:12px;color:var(--muted);">+254${p.phone}</td>
              <td style="font-weight:700;color:var(--gold);">KSh 100</td>
              <td style="font-size:12px;color:var(--muted);">${formatAdminTime(p.time)}</td>
              <td>
                <button class="action-btn success" onclick="confirmUnlock(${i})">✅ Confirm & Unlock</button>
                <button class="action-btn danger" onclick="rejectUnlock(${i})">✕ Reject</button>
              </td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}
    
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Messages</th>
            <th>Balance (USD)</th>
            <th>Access</th>
            <th>Last Active</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.length === 0 ? `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted);">No users yet. Users appear here when they sign up.</td></tr>` : ''}
          ${filtered.map(u => `
          <tr>
            <td>
              <div class="user-cell">
                <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;">
                  ${u.name[0]}
                </div>
                <div>
                  <div style="font-weight:600;font-size:13px;">${u.name}</div>
                  <div style="font-size:11px;color:var(--muted);">${u.email}</div>
                </div>
              </div>
            </td>
            <td style="font-size:12px;color:var(--muted);">${u.phone}</td>
            <td><span class="status-badge ${u.status}">${u.status}</span></td>
            <td><span style="font-weight:600;">${u.msgCount}</span></td>
            <td>
              <span style="font-weight:700;color:var(--success);">$${u.balance.toFixed(2)}</span>
              <button class="action-btn success" onclick="showEditBalance(${u.id})" style="margin-left:6px;">Edit</button>
            </td>
            <td>
              ${adminState.unlockedUsers[u.id] 
                ? '<span class="status-badge unlocked">✓ Unlocked</span>' 
                : '<span class="status-badge inactive">Locked</span>'}
              <button class="action-btn ${adminState.unlockedUsers[u.id]?'danger':'success'}" 
                onclick="${adminState.unlockedUsers[u.id]?`revokeAccess(${u.id})`:`grantAccess(${u.id})`}" style="margin-left:6px;">
                ${adminState.unlockedUsers[u.id]?'Revoke':'Unlock'}
              </button>
            </td>
            <td style="font-size:12px;color:var(--muted);">${u.lastActive}</td>
            <td>
              <button class="action-btn edit" onclick="showEditUser(${u.id})">Edit</button>
              <button class="action-btn danger" onclick="toggleUserStatus(${u.id})">${u.status==='active'?'Suspend':'Activate'}</button>
            </td>
          </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}

function renderProfiles() {
  const edits = getProfileEdits();
  const merged = ALL_PROFILES_FULL.map(p => ({ ...p, ...(edits[p.id] || {}) }));
  const filtered = merged.filter(p =>
    !adminState.search ||
    p.name.toLowerCase().includes(adminState.search.toLowerCase()) ||
    p.country.toLowerCase().includes(adminState.search.toLowerCase())
  );

  return `
  <div>
    <div class="page-header">
      <div class="page-title">Profile Management</div>
      <input class="search-input" placeholder="Search by name or country..." value="${adminState.search}"
        oninput="adminState.search=this.value;render()">
    </div>

    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;">${filtered.length} of ${merged.length} profiles</div>

    <div class="profiles-grid-admin">
      ${filtered.map(p => `
      <div class="profile-admin-card">
        <img class="profile-admin-photo" src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.src='https://i.pravatar.cc/300?img=10'">
        <div class="profile-admin-body">
          <div class="profile-admin-name">${p.name}${edits[p.id] ? ' <span style="color:var(--accent2);font-size:10px;">●edited</span>' : ''}</div>
          <div class="profile-admin-meta">📍 ${p.city || ''}${p.city ? ', ' : ''}${p.country}</div>
          <div class="profile-admin-actions">
            <button class="action-btn edit" onclick="showProfileEdit(${p.id})">Edit Profile</button>
          </div>
        </div>
      </div>
      `).join('')}
    </div>

    ${filtered.length === 0 ? `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;color:var(--muted);">
      No profiles match your search.
    </div>
    ` : ''}
  </div>
  `;
}

        <div style="margin-bottom:16px;">
          <input type="file" id="ep-photo-file" accept="image/*" style="display:none;" onchange="uploadProfilePhoto(${p.id})">
          <button type="button" class="btn-modal" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:100%;"
            onclick="document.getElementById('ep-photo-file').click()">
            📷 Upload Photo from Device
          </button>
          <div id="ep-upload-status" style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center;"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="input-group">
            <label class="input-label">Name</label>
            <input type="text" class="form-input" id="ep-name" value="${p.name}">
          </div>
          <div class="input-group">
            <label class="input-label">Age</label>
            <input type="number" class="form-input" id="ep-age" value="${p.age}" min="18" max="60">
          </div>
          <div class="input-group">
            <label class="input-label">City</label>
            <input type="text" class="form-input" id="ep-city" value="${p.city}">
          </div>
          <div class="input-group">
            <label class="input-label">Country</label>
            <input type="text" class="form-input" id="ep-country" value="${p.country}">
          </div>
        </div>
        <div class="input-group" style="margin-top:4px;">
          <label class="input-label">Bio</label>
          <textarea class="form-input" id="ep-bio" rows="3" style="resize:vertical;">${p.bio}</textarea>
        </div>
        <div class="input-group">
          <label class="input-label">Interests (comma separated)</label>
          <input type="text" class="form-input" id="ep-interests" value="${p.interests}">
        </div>
        <div class="modal-actions">
          <button class="btn-modal btn-cancel" onclick="adminState.modal=null;render()">Cancel</button>
          <button class="btn-modal" style="background:rgba(220,38,38,0.1);color:#f87171;" onclick="resetProfileEdit(${p.id})">Reset to Default</button>
          <button class="btn-modal btn-confirm" onclick="saveProfileEdit(${p.id})">Save Profile</button>
        </div>
      </div>
    </div>
    `;
  }

  return '';
}

// ============================================================
// ACTIONS
// ============================================================
function doAdminLogin() {
  try {
    const userInput = document.getElementById('admin-user');
    const passInput = document.getElementById('admin-pass');
    const user = (userInput?.value || '').trim();
    const pass = (passInput?.value || '').trim();

    if (user === ADMIN_CREDS.user && pass === ADMIN_CREDS.pass) {
      adminState.view = 'dashboard';
      setupAdminFirestoreListeners();
      render();
    } else {
      showAdminToast('Invalid credentials. Please try again.');
      render();
    }
  } catch(e) {
    console.error('Login error:', e);
    alert('Login error: ' + e.message);
  }
}

function doAdminLogout() {
  adminUnsubscribers.forEach(u => u());
  adminUnsubscribers = [];
  adminState.view = 'login';
  render();
}

function setPage(page) {
  adminState.page = page;
  render();
}

function sendAdminReply() {
  const input = document.getElementById('admin-reply-input');
  const text = input?.value?.trim();
  if (!text || !adminState.activeConv) return;

  const conv = adminState.conversations[adminState.activeConv];
  if (!conv) return;

  const newMsg = { role: 'assistant', content: text, time: new Date().toISOString() };
  conv.messages.push(newMsg);

  // Write reply to Firestore so the user app picks it up in real-time
  if (window.CGFirestore) {
    const [userEmail, profileId] = adminState.activeConv.split('_');
    window.CGFirestore.saveConversation(userEmail, profileId, {
      userName: conv.userName,
      userEmail: conv.userEmail,
      profileName: conv.profileName,
      profilePhoto: conv.profilePhoto,
      profileCountry: conv.profileCountry,
      messages: conv.messages
    }).catch(e => console.log('Firestore write error:', e));
  }

  input.value = '';
  showAdminToast('Reply sent!');
  render();
}

function handleAdminKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAdminReply();
  }
}

function showEditBalance(userId) {
  adminState.modal = { type: 'editBalance', userId };
  render();
}

function showEditUser(userId) {
  adminState.modal = { type: 'editUser', userId };
  render();
}

function showProfileEdit(profileId) {
  const base = ALL_PROFILES_FULL.find(x=>x.id===profileId);
  if (!base) return;
  const edits = getProfileEdits();
  const p = { ...base, ...(edits[profileId] || {}) };
  adminState.modal = { type: 'editProfile', profile: JSON.parse(JSON.stringify(p)) };
  render();
}

function confirmUnlock(index) {
  const pending = adminState.pendingUnlocks[index];
  if (!pending) return;

  // Grant access in admin state
  adminState.unlockedUsers[pending.userId] = true;

  // Write unlock + remove pending request in Firestore
  if (window.CGFirestore) {
    window.CGFirestore.setUnlocked(pending.userId, true).catch(e => console.log(e));
    if (pending._id) {
      window.CGFirestore.removePendingUnlock(pending._id).catch(e => console.log(e));
    }
    window.CGFirestore.addTransaction({
      user: pending.userName,
      phone: '+254' + pending.phone,
      amount: 100,
      currency: 'KES',
      status: 'completed',
      ref: 'CG-' + pending.userName.split(' ')[0].toUpperCase() + '-' + Date.now()
    }).catch(e => console.log(e));
  }

  // Optimistic local update
  adminState.transactions.unshift({
    id: 'TXN' + String(adminState.transactions.length + 1).padStart(3,'0'),
    user: pending.userName,
    phone: '+254' + pending.phone,
    amount: 100,
    currency: 'KES',
    status: 'completed',
    ref: 'CG-' + pending.userName.split(' ')[0].toUpperCase() + '-' + Date.now(),
    time: new Date()
  });

  adminState.pendingUnlocks.splice(index, 1);
  showAdminToast('Unlocked ' + pending.userName + ' successfully!');
  render();
}

function rejectUnlock(index) {
  const pending = adminState.pendingUnlocks[index];
  if (!pending) return;
  if (window.CGFirestore && pending._id) {
    window.CGFirestore.removePendingUnlock(pending._id).catch(e => console.log(e));
  }
  adminState.pendingUnlocks.splice(index, 1);
  showAdminToast('Payment rejected for ' + pending.userName);
  render();
}

function grantAccess(userId) {
  adminState.unlockedUsers[userId] = true;
  if (window.CGFirestore) {
    window.CGFirestore.setUnlocked(userId, true).catch(e => console.log(e));
  }
  const user = adminState.users.find(u=>u.id===userId) || { name: userId };
  showAdminToast('Full access granted to ' + user.name);
  render();
}

function revokeAccess(userId) {
  delete adminState.unlockedUsers[userId];
  if (window.CGFirestore) {
    window.CGFirestore.setUnlocked(userId, false).catch(e => console.log(e));
  }
  const user = adminState.users.find(u=>u.id===userId) || { name: userId };
  showAdminToast('Access revoked for ' + user.name);
  render();
}

function saveBalance(userId) {
  const balance = parseFloat(document.getElementById('modal-balance')?.value || 0);
  const user = adminState.users.find(u=>u.id===userId);
  if (user) {
    user.balance = balance;
    showAdminToast(`✅ Balance updated to $${balance.toFixed(2)} for ${user.name}`);
  }
  adminState.modal = null;
  render();
}

function saveUser(userId) {
  const name = document.getElementById('modal-name')?.value;
  const email = document.getElementById('modal-email')?.value;
  const phone = document.getElementById('modal-phone')?.value;
  const user = adminState.users.find(u=>u.id===userId);
  if (user) {
    if (name) user.name = name;
    if (email) user.email = email;
    if (phone) user.phone = phone;
    showAdminToast(`✅ User ${user.name} updated`);
  }
  adminState.modal = null;
  render();
}

function toggleUserStatus(userId) {
  const user = adminState.users.find(u=>u.id===userId);
  if (user) {
    user.status = user.status === 'active' ? 'inactive' : 'active';
    showAdminToast(`✅ User ${user.name} ${user.status}`);
    render();
  }
}

// ============================================================
// CLOUDINARY UPLOAD
// ============================================================
// To enable: create a free account at cloudinary.com, then go to
// Settings → Upload → Add upload preset → set "Signing Mode" to "Unsigned"
// Replace the two values below with your cloud name and preset name.
const CLOUDINARY_CLOUD_NAME = 'djcu6tsix';
const CLOUDINARY_UPLOAD_PRESET = 'connectglobal';

async function uploadProfilePhoto(profileId) {
  const fileInput = document.getElementById('ep-photo-file');
  const statusEl = document.getElementById('ep-upload-status');
  const file = fileInput?.files?.[0];
  if (!file) return;

  if (CLOUDINARY_CLOUD_NAME === 'YOUR_CLOUD_NAME') {
    statusEl.textContent = '⚠️ Cloudinary not configured yet — paste a Photo URL instead for now.';
    statusEl.style.color = '#fbbf24';
    return;
  }

  statusEl.textContent = '⏳ Uploading photo...';
  statusEl.style.color = 'var(--muted)';

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

    const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD_NAME + '/image/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (data.secure_url) {
      const photoInput = document.getElementById('ep-photo');
      const preview = document.getElementById('ep-photo-preview');
      photoInput.value = data.secure_url;
      preview.src = data.secure_url;
      statusEl.textContent = '✅ Photo uploaded successfully!';
      statusEl.style.color = '#34d399';
    } else {
      statusEl.textContent = '⚠️ Upload failed: ' + (data.error?.message || 'unknown error');
      statusEl.style.color = '#f87171';
    }
  } catch(e) {
    statusEl.textContent = '⚠️ Upload error: ' + e.message;
    statusEl.style.color = '#f87171';
  }
}

function saveProfileEdit(profileId) {
  const name = document.getElementById('ep-name')?.value?.trim();
  const age = document.getElementById('ep-age')?.value;
  const city = document.getElementById('ep-city')?.value?.trim();
  const country = document.getElementById('ep-country')?.value?.trim();
  const bio = document.getElementById('ep-bio')?.value?.trim();
  const interests = document.getElementById('ep-interests')?.value?.trim();
  const photo = document.getElementById('ep-photo')?.value?.trim();

  const editData = { name, age: parseInt(age), city, country, bio, interests, photo };

  // Save to Firestore so app.html picks it up live
  if (window.CGFirestore) {
    window.CGFirestore.saveProfileEdit(profileId, editData).catch(e => console.log(e));
  }
  // Optimistic local update
  profileEditsCache[profileId] = editData;

  showAdminToast('Profile for ' + name + ' saved!');
  adminState.modal = null;
  render();
}

function resetProfileEdit(profileId) {
  if (window.CGFirestore) {
    window.CGFirestore.deleteProfileEdit(profileId).catch(e => console.log(e));
  }
  delete profileEditsCache[profileId];

  showAdminToast('Profile reset to default');
  adminState.modal = null;
  render();
}

// ============================================================
// FIRESTORE REAL-TIME LISTENERS
// ============================================================
let adminUnsubscribers = [];

function setupAdminFirestoreListeners() {
  if (!window.CGFirestore) return;
  adminUnsubscribers.forEach(u => u());
  adminUnsubscribers = [];

  // All conversations — real-time
  const unsubConvs = window.CGFirestore.listenAllConversations((convs) => {
    adminState.conversations = convs;

    // Register/update users list based on conversations
    Object.values(convs).forEach(conv => {
      if (!conv.messages || conv.messages.length === 0) return;
      const exists = adminState.users.find(u => u.email === conv.userEmail);
      const msgCount = conv.messages.filter(m=>m.role==='user').length;
      if (!exists) {
        adminState.users.push({
          id: adminState.users.length + 1,
          name: conv.userName,
          email: conv.userEmail,
          phone: 'N/A',
          joined: new Date().toLocaleDateString(),
          status: 'active',
          balance: 0,
          msgCount: msgCount,
          unlockedCount: 0,
          lastActive: 'Just now'
        });
      } else {
        exists.msgCount = msgCount;
        exists.lastActive = 'Recently';
      }
    });

    render();
  });
  adminUnsubscribers.push(unsubConvs);

  // Pending unlocks — real-time
  const unsubPending = window.CGFirestore.listenPendingUnlocks((items) => {
    adminState.pendingUnlocks = items;
    render();
  });
  adminUnsubscribers.push(unsubPending);

  // Unlocked users — real-time
  const unsubUnlocked = window.CGFirestore.listenAllUnlocked((unlocked) => {
    adminState.unlockedUsers = unlocked;
    render();
  });
  adminUnsubscribers.push(unsubUnlocked);

  // Profile edits — real-time
  const unsubEdits = window.CGFirestore.listenProfileEdits((edits) => {
    profileEditsCache = edits;
    render();
  });
  adminUnsubscribers.push(unsubEdits);

  // Transactions — real-time
  const unsubTx = window.CGFirestore.listenTransactions((items) => {
    adminState.transactions = items.map(t => ({
      ...t,
      time: t.createdAt?.toDate ? t.createdAt.toDate() : new Date()
    })).sort((a,b) => b.time - a.time);
    render();
  });
  adminUnsubscribers.push(unsubTx);

  // Referrals — real-time
  const unsubRef = window.CGFirestore.listenReferrals((items) => {
    adminState.referrals = items;
    render();
  });
  adminUnsubscribers.push(unsubRef);
}

function showAdminToast(msg) {
  adminState.toast = msg;
}

function formatAdminTime(date) {
  if (!date) return '';
  const d = new Date(date);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + ' mins ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' hours ago';
  return d.toLocaleDateString();
}

function bindAdminEvents() {}

      <p>${e.message}</p>
      <p style="color:#999;margin-top:10px;">Try refreshing the page. If this persists, contact support.</p>
    </div>
  `;
}

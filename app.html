<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectGlobal — Meet People From Around the World</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --gold: #f59e0b;
    --text: #e2e2f0;
    --muted: #6b7280;
    --online: #10b981;
    --danger: #ef4444;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* AUTH SCREEN */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.1) 0%, transparent 50%),
                var(--bg);
    padding: 20px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #7c3aed, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .auth-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .tab-row {
    display: flex;
    background: var(--bg);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 9px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .tab-btn.active {
    background: var(--accent);
    color: white;
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform 0.1s, box-shadow 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
  .btn-primary:active { transform: translateY(0); }

  /* MAIN APP */
  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR NAV */
  .sidebar {
    width: 72px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
  }

  .sidebar-logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 32px;
  }

  .nav-item {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    position: relative;
    border: none;
    background: transparent;
    font-size: 20px;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: white; }

  .nav-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    background: var(--danger);
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar-bottom {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .user-avatar-sm {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid var(--accent);
  }

  /* MAIN CONTENT */
  .main-content {
    margin-left: 72px;
    flex: 1;
    min-height: 100vh;
  }

  /* PAGE HEADER */
  .page-header {
    padding: 24px 32px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
  }

  .page-subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* FILTERS BAR */
  .filters-bar {
    padding: 16px 32px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
  }

  .filter-chip {
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-chip.active, .filter-chip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* PROFILES GRID */
  .profiles-grid {
    padding: 0 32px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .profile-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(124,58,237,0.2);
  }

  .profile-card-photo {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
  }

  .profile-card-body { padding: 14px; }

  .profile-card-name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 3px;
  }

  .profile-card-meta {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .online-dot {
    width: 8px;
    height: 8px;
    background: var(--online);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--online);
  }

  .profile-card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    background: rgba(124,58,237,0.15);
    color: var(--accent2);
    border-radius: 100px;
    border: 1px solid rgba(124,58,237,0.2);
  }

  .verified-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(16,185,129,0.9);
    border-radius: 100px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    color: white;
    backdrop-filter: blur(4px);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s;
    scrollbar-width: none;
  }

  .modal-card::-webkit-scrollbar { display: none; }

  .modal-photo {
    width: 100%;
    height: 320px;
    object-fit: cover;
    border-radius: 24px 24px 0 0;
  }

  .modal-body { padding: 24px; }

  .modal-name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .modal-location {
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--bg);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }

  .stat-num { font-weight: 700; font-size: 18px; color: var(--accent2); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .modal-bio {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(226,226,240,0.8);
    margin-bottom: 20px;
  }

  .interests-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .interest-tag {
    padding: 6px 14px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
  }

  .modal-actions {
    display: flex;
    gap: 12px;
  }

  .btn-chat {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .btn-close {
    padding: 13px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  /* CHAT PAGE */
  .chat-layout {
    display: flex;
    height: 100vh;
  }

  .chat-list {
    width: 300px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
    scrollbar-width: none;
  }

  .chat-list::-webkit-scrollbar { display: none; }

  .chat-list-header {
    padding: 20px 20px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }

  .chat-item {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    position: relative;
  }

  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: rgba(124,58,237,0.1); }

  .chat-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    position: relative;
  }

  .chat-avatar-wrap { position: relative; flex-shrink: 0; }

  .chat-online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 10px;
    height: 10px;
    background: var(--online);
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  .chat-item-info { flex: 1; min-width: 0; }
  .chat-item-name { font-weight: 600; font-size: 14px; }
  .chat-item-preview { color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .chat-item-time { font-size: 11px; color: var(--muted); }

  .unread-badge {
    background: var(--accent);
    color: white;
    border-radius: 100px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
  }

  /* CHAT WINDOW */
  .chat-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .chat-header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .chat-header-name { font-weight: 600; font-size: 16px; }
  .chat-header-status { font-size: 12px; color: var(--online); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    animation: slideUp 0.2s;
  }

  .message.sent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    color: white;
  }

  .message.received {
    background: var(--surface);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }

  .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }

  .chat-input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 20px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }

  .chat-input:focus { border-color: var(--accent); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.1); }

  /* NO CHAT SELECTED */
  .chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--muted);
  }

  .chat-empty-icon { font-size: 64px; opacity: 0.3; }

  /* PAYWALL MODAL */
  .paywall-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    animation: slideUp 0.25s;
  }

  .paywall-icon { font-size: 56px; margin-bottom: 16px; }
  .paywall-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .paywall-text { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

  .price-tag {
    display: inline-block;
    background: rgba(245,158,11,0.15);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .phone-input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .country-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    width: 80px;
    text-align: center;
  }

  /* DASHBOARD PAGE */
  .dashboard-page { padding: 32px; }

  .balance-card {
    background: linear-gradient(135deg, #1e1030, #2d1555);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .balance-card::after {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, transparent 70%);
  }

  .balance-label { font-size: 13px; color: rgba(226,226,240,0.6); margin-bottom: 8px; }
  .balance-amount { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; color: white; }
  .balance-sub { font-size: 12px; color: var(--online); margin-top: 4px; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .activity-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .activity-icon { font-size: 20px; }
  .activity-info { flex: 1; }
  .activity-title { font-size: 14px; font-weight: 500; }
  .activity-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .activity-amount { font-weight: 700; color: var(--online); font-size: 14px; }

  /* PROFILE PAGE */
  .profile-page { padding: 32px; }

  .profile-hero {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
  }

  .profile-hero-photo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
  }

  .profile-hero-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .profile-hero-email { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .form-section-title { font-weight: 600; font-size: 16px; margin-bottom: 16px; }

  .btn-save {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    animation: slideUp 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  /* LOADING */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    align-self: flex-start;
    width: fit-content;
  }

  .typing-dot {
    width: 8px;
    height: 8px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
  }

  .stk-status {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    color: var(--online);
    font-size: 14px;
    margin-top: 16px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .main-content { margin-left: 60px; }
    .profiles-grid { grid-template-columns: repeat(2, 1fr); padding: 0 16px 24px; }
    .page-header { padding: 16px 16px 0; }

// ============================================================
// STATE
// ============================================================
let state = {
  view: 'auth',      // auth | home | chat | dashboard | profile
  authTab: 'login',
  currentUser: null,
  selectedProfile: null,
  activeChat: null,
  conversations: {},  // profileId -> [{role, content, time}]
  messageCounts: {},  // profileId -> number of user messages
  unlockedProfiles: {}, // profileId -> true
  filter: 'All',
  paywall: null,       // profileId pending unlock
  paywallPhone: '',
  stkSent: false,
  toast: null,
  balanceUSD: 0,
  profileName: '',
  profileEmail: '',
  profileBio: '',
};

const FILTERS = ['All','Europe','Asia','Africa','Americas','Middle East','Oceania'];

const REGION_MAP = {
  France:'Europe', Italy:'Europe', Sweden:'Europe', Romania:'Europe',
  Germany:'Europe', Poland:'Europe', Hungary:'Europe', Spain:'Europe',
  Portugal:'Europe', 'Czech Republic':'Europe', Austria:'Europe',
  Norway:'Europe', Finland:'Europe', Ukraine:'Europe', UK:'Europe',
  Japan:'Asia', 'South Korea':'Asia', China:'Asia', India:'Asia',
  Vietnam:'Asia', Pakistan:'Asia', Philippines:'Asia', Kazakhstan:'Asia',
  Senegal:'Africa', Nigeria:'Africa', Ghana:'Africa', Egypt:'Africa',
  Morocco:'Africa', Tonga:'Oceania', Australia:'Oceania',
  UAE:'Middle East', Lebanon:'Middle East', Iran:'Middle East',
  Brazil:'Americas', Colombia:'Americas', Mexico:'Americas', Canada:'Americas',
};

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  
  if (state.view === 'auth') {
    app.innerHTML = renderAuth();
  } else {
    app.innerHTML = renderApp();
  }
  
  bindEvents();
  
  if (state.toast) {
    setTimeout(() => {
      state.toast = null;
      render();
    }, 3000);
  }
  
  // Scroll chat to bottom
  const msgs = document.getElementById('chat-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function renderAuth() {
  return `
  <div class="auth-screen">
    <div class="auth-card">
      <div class="logo">ConnectGlobal</div>
      <div class="auth-subtitle">Meet incredible people from every corner of the world</div>
      
      <div class="tab-row">
        <button class="tab-btn ${state.authTab==='login'?'active':''}" onclick="setAuthTab('login')">Sign In</button>
        <button class="tab-btn ${state.authTab==='signup'?'active':''}" onclick="setAuthTab('signup')">Create Account</button>
      </div>
      
      ${state.authTab === 'login' ? `
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="doLogin()">Sign In →</button>
      ` : `
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-pass" placeholder="Min 8 characters">
        </div>
        <button class="btn-primary" onclick="doSignup()">Create Account →</button>
      `}
    </div>
  </div>
  `;
}

function renderApp() {
  const unreadTotal = Object.keys(state.conversations).filter(id => {
    const msgs = state.conversations[id] || [];
    return msgs.length > 0 && msgs[msgs.length-1].role === 'assistant';
  }).length;
  
  return `
  <div class="app-layout">
    <nav class="sidebar">
      <div class="sidebar-logo">CG</div>
      
      <button class="nav-item ${state.view==='home'?'active':''}" onclick="goTo('home')" title="Discover">🌍</button>
      <button class="nav-item ${state.view==='chat'?'active':''}" onclick="goTo('chat')" title="Messages">
        💬
        ${unreadTotal>0?`<span class="nav-badge">${unreadTotal}</span>`:''}
      </button>
      <button class="nav-item ${state.view==='dashboard'?'active':''}" onclick="goTo('dashboard')" title="Dashboard">📊</button>
      
      <div class="sidebar-bottom">
        <button class="nav-item ${state.view==='profile'?'active':''}" onclick="goTo('profile')" title="My Profile">👤</button>
        <button class="nav-item" onclick="doLogout()" title="Logout" style="font-size:16px;">🚪</button>
      </div>
    </nav>
    
    <main class="main-content">
      ${state.view==='home' ? renderHome() : ''}
      ${state.view==='chat' ? renderChat() : ''}
      ${state.view==='dashboard' ? renderDashboard() : ''}
      ${state.view==='profile' ? renderProfilePage() : ''}
    </main>
    
    ${state.selectedProfile ? renderProfileModal() : ''}
    ${state.paywall ? renderPaywallModal() : ''}
    ${state.toast ? `<div class="toast">${state.toast}</div>` : ''}
  </div>
  `;
}

function renderHome() {
  const filtered = PROFILES.filter(p => {
    if (state.filter === 'All') return true;
    return REGION_MAP[p.country] === state.filter;
  });
  
  return `
  <div>
    <div class="page-header">
      <div>
        <div class="page-title">Discover People</div>
        <div class="page-subtitle">${filtered.length} amazing people from around the world</div>
      </div>
      <div style="font-size:24px;">🌏</div>
    </div>
    
    <div class="filters-bar">
      ${FILTERS.map(f => `
        <button class="filter-chip ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${f}</button>
      `).join('')}
    </div>
    
    <div class="profiles-grid">
      ${filtered.map(p => renderProfileCard(p)).join('')}
    </div>
  </div>
  `;
}

function renderProfileCard(p) {
  return `
  <div class="profile-card" onclick="openProfile(${p.id})">
    ${p.verified ? '<div class="verified-badge">✓ Verified</div>' : ''}
    <img class="profile-card-photo" src="${p.photo}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400&h=500&fit=crop'">
    <div class="profile-card-body">
      <div class="profile-card-name">${p.name}, ${p.age}</div>
      <div class="profile-card-meta">
        ${p.online ? '<span class="online-dot"></span>' : ''}

      </div>
      <div class="profile-card-tags">
        ${p.interests.slice(0,2).map(i=>`<span class="tag">${i}</span>`).join('')}

          </div>

          </div>

function renderPaywallModal() {
  return `
  <div class="modal-overlay" onclick="closePaywall(event)">
    <div class="paywall-modal" onclick="event.stopPropagation()">
      <div class="paywall-icon">🔐</div>
      <div class="paywall-title">Unlock Full Access</div>
      <div class="paywall-text">You've used your 3 free messages. Unlock unlimited chatting with all profiles for just:</div>

      ${!state.stkSent ? `

function renderChat() {
  const chatProfiles = Object.keys(state.conversations).map(id => PROFILES.find(p=>p.id==id)).filter(Boolean);
  
  return `
  <div class="chat-layout">
    <div class="chat-list">
      <div class="chat-list-header">Messages</div>
      ${chatProfiles.length === 0 ? `
        <div style="padding:32px;text-align:center;color:var(--muted);font-size:13px;">
          <div style="font-size:48px;margin-bottom:12px;">💌</div>
          No conversations yet.<br>Discover profiles to start chatting!
        </div>
      ` : chatProfiles.map(p => {
        const msgs = state.conversations[p.id] || [];
        const last = msgs[msgs.length-1];
        const count = state.messageCounts[p.id] || 0;
        return `
        <div class="chat-item ${state.activeChat===p.id?'active':''}" onclick="openChat(${p.id})">
          <div class="chat-avatar-wrap">
            <img class="chat-avatar" src="${p.photo}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400&h=500&fit=crop'">
            ${p.online?'<span class="chat-online-dot"></span>':''}
          </div>
          <div class="chat-item-info">
            <div class="chat-item-name">${p.name.split(' ')[0]}</div>
            <div class="chat-item-preview">${last ? (last.role==='assistant'?last.content:'You: '+last.content) : 'Start a conversation!'}</div>
          </div>
          <div>
            <div class="chat-item-time">${formatTime(new Date())}</div>
            ${last&&last.role==='assistant'&&last!==msgs[msgs.length-2]?'<span class="unread-badge">1</span>':''}
          </div>
        </div>
        `;
      }).join('')}
    </div>
    
    ${state.activeChat ? renderChatWindow() : `
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div>Select a conversation to start chatting</div>
      </div>
    `}
  </div>
  `;
}

function renderChatWindow() {
  const p = PROFILES.find(p=>p.id===state.activeChat);
  if (!p) return '';
  const msgs = state.conversations[p.id] || [];
  const count = state.messageCounts[p.id] || 0;
  const unlocked = state.unlockedProfiles[p.id];
  
  return `
  <div class="chat-window">
    <div class="chat-header">
      <img class="chat-avatar" src="${p.photo}" style="width:44px;height:44px;" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400&h=500&fit=crop'" alt="${p.name}">
      <div style="flex:1">
        <div class="chat-header-name">${p.name}</div>
        <div class="chat-header-status">${p.online?'🟢 Online now':'⚪ Last seen recently'}</div>
      </div>
      <div style="font-size:13px;color:var(--muted);">
        ${!unlocked ? `${3-count} free msg${3-count!==1?'s':''} left` : '✨ Full access'}
      </div>
    </div>
    
    <div class="chat-messages" id="chat-messages">
      ${msgs.length === 0 ? `
        <div style="text-align:center;color:var(--muted);padding:40px;font-size:14px;">
          <div style="font-size:48px;margin-bottom:12px;">${p.photo?'':'👋'}</div>
          Say hello to ${p.name.split(' ')[0]}!<br>
          <span style="font-size:12px;">${unlocked?'Unlimited messages':'You have 3 free messages'}</span>
        </div>
      ` : msgs.map(m => `
        <div class="message ${m.role==='user'?'sent':'received'}">
          ${m.content}
          <div class="message-time">${formatTime(m.time)}</div>
        </div>
      `).join('')}

    </div>
    
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1"
        onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
  `;
}

// ============================================================
// ACTIONS
// ============================================================
function setAuthTab(tab) {
  state.authTab = tab;
  render();
}

function doLogin() {
  const email = document.getElementById('login-email')?.value;
  const pass = document.getElementById('login-pass')?.value;
  if (!email || !pass) { showToast('⚠️ Please fill in all fields'); return; }
  state.currentUser = { name: email.split('@')[0], email, bio: '' };
  state.view = 'home';
  render();
}

function doSignup() {
  const name = document.getElementById('signup-name')?.value;
  const email = document.getElementById('signup-email')?.value;
  const pass = document.getElementById('signup-pass')?.value;
  if (!name || !email || !pass) { showToast('⚠️ Please fill in all fields'); return; }
  if (pass.length < 8) { showToast('⚠️ Password must be at least 8 characters'); return; }
  state.currentUser = { name, email, bio: '' };
  state.view = 'home';
  showToast('🎉 Welcome to ConnectGlobal!');
  render();
}

function doLogout() {
  state.view = 'auth';
  state.currentUser = null;
  render();
}

function goTo(view) {
  state.view = view;
  if (view !== 'chat') state.activeChat = null;
  render();
}

function setFilter(f) {
  state.filter = f;
  render();
}

function openProfile(id) {
  state.selectedProfile = PROFILES.find(p=>p.id===id);
  render();
}

function closeProfile(e) {
  if (e && e.target !== e.currentTarget) return;
  state.selectedProfile = null;
  render();
}

function startChat(profileId) {
  if (!state.conversations[profileId]) {
    state.conversations[profileId] = [];
    state.messageCounts[profileId] = 0;
  }
  state.selectedProfile = null;
  state.activeChat = profileId;
  state.view = 'chat';
  render();
}

function openChat(profileId) {
  state.activeChat = profileId;
  render();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input?.value?.trim();
  if (!text) return;
  
  const profileId = state.activeChat;
  const profile = PROFILES.find(p=>p.id===profileId);
  
  // Check paywall — also check localStorage unlock granted by admin
  const count = state.messageCounts[profileId] || 0;
  const localUnlock = getAdminUnlocks();
  const unlocked = state.unlockedProfiles[profileId] || localUnlock[state.currentUser?.email];
  if (unlocked) state.unlockedProfiles[profileId] = true;
  
  if (!unlocked && count >= 3) {
    state.paywall = profileId;
    render();
    return;
  }
  
  // Store message locally
  if (!state.conversations[profileId]) state.conversations[profileId] = [];
  const msg = { role:'user', content:text, time:new Date().toISOString() };
  state.conversations[profileId].push(msg);
  state.messageCounts[profileId] = (state.messageCounts[profileId]||0) + 1;
  input.value = '';
  input.style.height = 'auto';

  // ── Bridge to admin via localStorage ──
  saveConversationToStorage(profileId, profile);

  render();
  // Poll for admin reply
  pollForAdminReply(profileId);
}

function getAdminUnlocks() {
  try { return JSON.parse(localStorage.getItem('cg_unlocked_users') || '{}'); } catch { return {}; }
}

function saveConversationToStorage(profileId, profile) {
  try {
    const key = 'cg_conv_' + state.currentUser.email + '_' + profileId;
    const existing = JSON.parse(localStorage.getItem(key) || '{}');
    const conv = {
      userId: state.currentUser.email,
      userName: state.currentUser.name,
      userEmail: state.currentUser.email,
      profileId: profileId,
      profileName: profile.name,
      profilePhoto: profile.photo,
      profileCountry: profile.country,
      messages: state.conversations[profileId] || [],
      lastUpdated: new Date().toISOString()
    };
    localStorage.setItem(key, JSON.stringify(conv));
    // Also update index of all conversations
    const index = JSON.parse(localStorage.getItem('cg_conv_index') || '[]');
    if (!index.includes(key)) { index.push(key); localStorage.setItem('cg_conv_index', JSON.stringify(index)); }
  } catch(e) { console.log('Storage error:', e); }
}

let pollTimer = null;
function pollForAdminReply(profileId) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    try {
      const key = 'cg_conv_' + state.currentUser.email + '_' + profileId;
      const stored = JSON.parse(localStorage.getItem(key) || '{}');
      if (!stored.messages) return;
      const storedMsgs = stored.messages;
      const localMsgs = state.conversations[profileId] || [];
      // If stored has more messages than local (admin replied), update
      if (storedMsgs.length > localMsgs.length) {
        state.conversations[profileId] = storedMsgs;
        render();
      }
      // Check if admin unlocked this user
      const unlocks = getAdminUnlocks();
      if (unlocks[state.currentUser?.email] && !state.unlockedProfiles[profileId]) {
        state.unlockedProfiles[profileId] = true;
        showToast('🎉 Your access has been unlocked! Chat freely!');
        render();
      }
    } catch(e) {}
  }, 3000); // check every 3 seconds
}

function closePaywall(e) {
  if (e && e.target !== e.currentTarget) return;
  state.paywall = null;
  state.stkSent = false;
  render();
}

async function initiateSTK() {
  const phone = document.getElementById('mpesa-phone')?.value?.trim();
  if (!phone || phone.length < 9) {
    showToast('⚠️ Enter a valid Safaricom number');
    return;
  }

  showToast('⏳ Processing payment request...');

  // Save pending payment to localStorage so admin sees it
  try {
    const pending = JSON.parse(localStorage.getItem('cg_pending_unlocks') || '[]');
    pending.push({
      userId: state.currentUser.email,
      userName: state.currentUser.name,
      phone: phone,
      time: new Date().toISOString()
    });
    localStorage.setItem('cg_pending_unlocks', JSON.stringify(pending));
  } catch(e) {}

  // IntaSend STK Push
  try {
    // Replace YOUR_INTASEND_PUBLISHABLE_KEY with your IntaSend key from intasend.com
    const INTASEND_KEY = 'YOUR_INTASEND_PUBLISHABLE_KEY';
    const fullPhone = '254' + phone.replace(/^0+/, '');
    const res = await fetch('https://sandbox.intasend.com/api/v1/payment/mpesa-stk-push/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + INTASEND_KEY
      },
      body: JSON.stringify({
        phone_number: fullPhone,
        amount: 100,
        currency: 'KES',
        narrative: 'ConnectGlobal Chat Access'
      })
    });
    const data = await res.json();
    console.log('IntaSend response:', data);
  } catch(err) {
    console.log('IntaSend request sent (check network):', err.message);
  }

  state.stkSent = true;
  render();
}



function saveProfile() {
  const name = document.getElementById('edit-name')?.value;
  const email = document.getElementById('edit-email')?.value;
  const bio = document.getElementById('edit-bio')?.value;
  if (name) state.currentUser.name = name;
  if (email) state.currentUser.email = email;
  if (bio !== undefined) state.currentUser.bio = bio;
  showToast('✅ Profile saved!');
  render();
}

function showToast(msg) {
  state.toast = msg;
}

function formatTime(date) {
  if (!date) return '';
  const d = new Date(date);
  return d.toLocaleTimeString('en', { hour:'2-digit', minute:'2-digit', hour12:true });
}

// ============================================================
// BIND EVENTS
// ============================================================
function bindEvents() {
  // Nothing special needed - all onclick attributes handle events
}

// ============================================================
// INIT
// ============================================================
render();
</script>

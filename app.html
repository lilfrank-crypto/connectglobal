<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>ConnectGlobal — Meet People From Around the World</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');

  :root {
    --bg: #08070c;
    --surface: #131019;
    --surface2: #1b1725;
    --surface-glass: rgba(255,255,255,0.045);
    --border: rgba(255,255,255,0.09);
    --border-soft: rgba(255,255,255,0.06);
    --accent: #8b5cf6;
    --accent2: #ec4899;
    --accent3: #6366f1;
    --gold: #f59e0b;
    --text: #f1f0f7;
    --muted: #8b899c;
    --online: #22c55e;
    --danger: #ef4444;
    --radius: 18px;
    --radius-sm: 12px;
    --radius-lg: 26px;
    --radius-full: 999px;
    --shadow-sm: 0 2px 10px rgba(0,0,0,0.25);
    --shadow-md: 0 10px 34px rgba(0,0,0,0.4);
    --shadow-lg: 0 25px 70px rgba(0,0,0,0.55);
    --shadow-glow: 0 8px 28px rgba(139,92,246,0.35);
    --ease: cubic-bezier(0.16,1,0.3,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }

  body {
    background:
      radial-gradient(ellipse 900px 500px at 15% -5%, rgba(139,92,246,0.16) 0%, transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 10%, rgba(236,72,153,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 800px 600px at 50% 110%, rgba(99,102,241,0.10) 0%, transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* AUTH SCREEN */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02)), var(--surface);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(120deg, #a78bfa, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .auth-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .tab-row {
    display: flex;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-full);
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: var(--radius-full);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s var(--ease);
    font-family: 'Inter', sans-serif;
  }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    color: white;
    box-shadow: 0 4px 14px rgba(139,92,246,0.35);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-input {
    width: 100%;
    background: rgba(0,0,0,0.22);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s var(--ease);
    outline: none;
  }

  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139,92,246,0.15); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform 0.18s var(--ease), box-shadow 0.25s var(--ease), filter 0.2s;
    margin-top: 8px;
    box-shadow: var(--shadow-glow);
  }

  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.08); box-shadow: 0 12px 34px rgba(139,92,246,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; filter: none; }

  /* MAIN APP */
  .app-layout {
    display: flex;
    min-height: 100vh;
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* SIDEBAR NAV */
  .sidebar {
    width: 72px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 100;
  }

  .sidebar-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 32px;
  }

  .nav-item {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    position: relative;
    border: none;
    background: transparent;
    font-size: 20px;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent3)); color: white; box-shadow: 0 4px 14px rgba(139,92,246,0.4); }

  .nav-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    background: var(--danger);
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar-bottom {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .user-avatar-sm {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid var(--accent);
  }

  /* MAIN CONTENT */
  .main-content {
    margin-left: 72px;
    flex: 1;
    min-height: 100vh;
    width: calc(100% - 72px);
    overflow-x: hidden;
  }

  /* PAGE HEADER */
  .page-header {
    padding: 24px 32px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .page-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
  }

  .page-subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* FILTERS BAR */
  .filters-bar {
    padding: 16px 32px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
  }

  .filter-chip {
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-chip.active, .filter-chip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* PROFILES GRID */
  .profiles-grid {
    padding: 0 16px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
    position: relative;
    box-shadow: var(--shadow-sm);
  }

  .profile-card:hover {
    transform: translateY(-6px) scale(1.01);
    border-color: rgba(139,92,246,0.5);
    box-shadow: 0 16px 40px rgba(139,92,246,0.25);
  }

  .profile-card-photo {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--surface2);
    min-height: 160px;
  }

  .profile-card-body { padding: 14px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.15)); }

  .profile-card-name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 3px;
    letter-spacing: -0.01em;
  }

  .profile-card-meta {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .online-dot {
    width: 8px;
    height: 8px;
    background: var(--online);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--online);
  }

  .profile-card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    background: rgba(124,58,237,0.15);
    color: var(--accent2);
    border-radius: 100px;
    border: 1px solid rgba(124,58,237,0.2);
  }

  .verified-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(16,185,129,0.9);
    border-radius: 100px;
    padding: 3px 7px;
    font-size: 10px;
    font-weight: 600;
    color: white;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)), var(--surface);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s var(--ease);
    scrollbar-width: none;
    box-shadow: var(--shadow-lg);
  }

  .modal-card::-webkit-scrollbar { display: none; }

  .modal-photo {
    width: 100%;
    height: 320px;
    object-fit: cover;
    border-radius: 24px 24px 0 0;
  }

  .modal-body { padding: 24px; }

  .modal-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .modal-location {
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--bg);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }

  .stat-num { font-weight: 700; font-size: 18px; color: var(--accent2); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .modal-bio {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(226,226,240,0.8);
    margin-bottom: 20px;
  }

  .interests-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .interest-tag {
    padding: 6px 14px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
  }

  .modal-actions {
    display: flex;
    gap: 12px;
  }

  .btn-chat {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .btn-close {
    padding: 13px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  /* CHAT PAGE */
  .chat-layout {
    display: flex;
    height: 100vh;
  }

  .chat-list {
    width: 300px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
    scrollbar-width: none;
  }

  .chat-list::-webkit-scrollbar { display: none; }

  .chat-list-header {
    padding: 20px 20px 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }

  .chat-item {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    position: relative;
  }

  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: rgba(124,58,237,0.1); }

  .chat-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    position: relative;
  }

  .chat-avatar-wrap { position: relative; flex-shrink: 0; }

  .chat-online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 10px;
    height: 10px;
    background: var(--online);
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  .chat-item-info { flex: 1; min-width: 0; }
  .chat-item-name { font-weight: 600; font-size: 14px; }
  .chat-item-preview { color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .chat-item-time { font-size: 11px; color: var(--muted); }

  .unread-badge {
    background: var(--accent);
    color: white;
    border-radius: 100px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
  }

  /* CHAT WINDOW */
  .chat-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .chat-header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .chat-header-name { font-weight: 600; font-size: 16px; }
  .chat-header-status { font-size: 12px; color: var(--online); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    animation: slideUp 0.2s;
  }

  .message.sent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    color: white;
  }

  .message.received {
    background: var(--surface);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }

  .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }

  .chat-input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 20px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }

  .chat-input:focus { border-color: var(--accent); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.1); }

  /* NO CHAT SELECTED */
  .chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--muted);
  }

  .chat-empty-icon { font-size: 64px; opacity: 0.3; }

  /* PAYWALL MODAL */
  .paywall-modal {
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)), var(--surface);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    animation: slideUp 0.3s var(--ease);
    box-shadow: var(--shadow-lg);
  }

  .paywall-icon { font-size: 56px; margin-bottom: 16px; }
  .paywall-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .paywall-text { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

  .price-tag {
    display: inline-block;
    background: rgba(245,158,11,0.15);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .phone-input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .country-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    width: 80px;
    text-align: center;
  }

  /* DASHBOARD PAGE */
  .dashboard-page { padding: 32px; }

  .balance-card {
    background: linear-gradient(140deg, #241338 0%, #3b1663 55%, #4c1d7a 100%);
    border: 1px solid rgba(139,92,246,0.35);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }

  .balance-card::after {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(236,72,153,0.28) 0%, transparent 70%);
  }

  .balance-card::before {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -30px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
  }

  .balance-label { font-size: 13px; color: rgba(241,240,247,0.65); margin-bottom: 8px; letter-spacing: 0.02em; }
  .balance-amount { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 700; color: white; letter-spacing: -0.02em; position: relative; z-index:1; }
  .balance-sub { font-size: 12px; color: #4ade80; margin-top: 6px; position: relative; z-index:1; }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .activity-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .activity-icon { font-size: 20px; }
  .activity-info { flex: 1; }
  .activity-title { font-size: 14px; font-weight: 500; }
  .activity-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .activity-amount { font-weight: 700; color: var(--online); font-size: 14px; }

  /* PROFILE PAGE */
  .profile-page { padding: 32px; }

  .profile-hero {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);

<!-- Firebase SDK (Firestore + Auth for real-time sync & user accounts) -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getFirestore, collection, doc, setDoc, getDoc, getDocs,
    onSnapshot, query, where, orderBy, serverTimestamp, deleteDoc, updateDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup,
    updateProfile, sendPasswordResetEmail
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCRpHTVqVPC_rX54auYGcIk3xy4yMOVQ2o",
    authDomain: "connectglobal-2458e.firebaseapp.com",
    projectId: "connectglobal-2458e",
    storageBucket: "connectglobal-2458e.firebasestorage.app",
    messagingSenderId: "272739449615",
    appId: "1:272739449615:web:7a1470c4ca332d9014dc7a"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const auth = getAuth(fbApp);
  const googleProvider = new GoogleAuthProvider();

  // ============================================================
  // Firebase Authentication API
  // ============================================================
  window.CGAuth = {
    auth,

    async signUp(name, email, password) {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      return { name, email: cred.user.email, uid: cred.user.uid };
    },

    async signIn(email, password) {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      return {
        name: cred.user.displayName || cred.user.email.split('@')[0],
        email: cred.user.email,
        uid: cred.user.uid
      };
    },

    async signInWithGoogle() {
      const cred = await signInWithPopup(auth, googleProvider);
      return {
        name: cred.user.displayName || cred.user.email.split('@')[0],
        email: cred.user.email,
        uid: cred.user.uid,
        photoURL: cred.user.photoURL
      };
    },

    async logOut() {
      await signOut(auth);
    },

    async resetPassword(email) {
      await sendPasswordResetEmail(auth, email);
    },

    // Listen for auth state changes (e.g. session restored on page reload)
    onAuthChange(callback) {
      return onAuthStateChanged(auth, (user) => {
        if (user) {
          callback({
            name: user.displayName || user.email.split('@')[0],
            email: user.email,
            uid: user.uid,
            photoURL: user.photoURL
          });
        } else {
          callback(null);
        }
      });
    }
  };

  // ============================================================
  // Expose a simple global API for the main inline script to use
  // ============================================================
  window.CGFirestore = {
    db,

    // Save/update a conversation document: conversations/{userEmail}_{profileId}
    async saveConversation(userEmail, profileId, data) {
      const id = userEmail + '_' + profileId;
      await setDoc(doc(db, 'conversations', id), {
        ...data,
        userEmail,
        profileId: Number(profileId),
        updatedAt: serverTimestamp()
      }, { merge: true });
    },

    // Listen to a single conversation in real-time
    listenConversation(userEmail, profileId, callback) {
      const id = userEmail + '_' + profileId;
      return onSnapshot(doc(db, 'conversations', id), (snap) => {
        callback(snap.exists() ? snap.data() : null);
      });
    },

    // Listen to ALL conversations (for admin)
    listenAllConversations(callback) {
      return onSnapshot(collection(db, 'conversations'), (snap) => {
        const convs = {};
        snap.forEach(d => { convs[d.id] = d.data(); });
        callback(convs);
      });
    },

    // Listen to ALL conversations belonging to one user (for app.html Messages tab)
    listenUserConversations(userEmail, callback) {
      const q = query(collection(db, 'conversations'), where('userEmail', '==', userEmail));
      return onSnapshot(q, (snap) => {
        const convs = {};
        snap.forEach(d => { convs[d.data().profileId] = d.data(); });
        callback(convs);
      });
    },

    // Pending unlock requests
    async addPendingUnlock(data) {
      const id = data.userId + '_' + Date.now();
      await setDoc(doc(db, 'pendingUnlocks', id), {
        ...data,
        createdAt: serverTimestamp()
      });
    },

    listenPendingUnlocks(callback) {
      return onSnapshot(collection(db, 'pendingUnlocks'), (snap) => {
        const items = [];
        snap.forEach(d => items.push({ _id: d.id, ...d.data() }));
        callback(items);
      });
    },

    async removePendingUnlock(docId) {
      await deleteDoc(doc(db, 'pendingUnlocks', docId));
    },

    // Unlocked users: unlockedUsers/{userEmail} -> { unlocked: true }
    async setUnlocked(userEmail, value) {
      await setDoc(doc(db, 'unlockedUsers', userEmail), { unlocked: value });
    },

    listenUnlocked(userEmail, callback) {
      return onSnapshot(doc(db, 'unlockedUsers', userEmail), (snap) => {
        callback(snap.exists() ? snap.data().unlocked : false);
      });
    },

    listenAllUnlocked(callback) {
      return onSnapshot(collection(db, 'unlockedUsers'), (snap) => {
        const result = {};
        snap.forEach(d => { result[d.id] = d.data().unlocked; });
        callback(result);
      });
    },

    // Profile edits: profileEdits/{profileId}
    async saveProfileEdit(profileId, data) {
      await setDoc(doc(db, 'profileEdits', String(profileId)), data);
    },

    async deleteProfileEdit(profileId) {
      await deleteDoc(doc(db, 'profileEdits', String(profileId)));
    },

    listenProfileEdits(callback) {
      return onSnapshot(collection(db, 'profileEdits'), (snap) => {
        const edits = {};
        snap.forEach(d => { edits[d.id] = d.data(); });
        callback(edits);
      });
    },

    // One-time fetch (faster initial paint than waiting for first snapshot)
    async getProfileEditsOnce() {
      const snap = await getDocs(collection(db, 'profileEdits'));
      const edits = {};
      snap.forEach(d => { edits[d.id] = d.data(); });
      return edits;
    },

    // Transactions log
    async addTransaction(data) {
      const id = 'TXN_' + Date.now();
      await setDoc(doc(db, 'transactions', id), {
        ...data,
        createdAt: serverTimestamp()
      });
    },

    listenTransactions(callback) {
      return onSnapshot(collection(db, 'transactions'), (snap) => {
        const items = [];
        snap.forEach(d => items.push({ _id: d.id, ...d.data() }));
        callback(items);
      });
    },

    // Referral tracking: referrals/{newUserEmail} -> { referrerCode, newUserEmail, createdAt }
    async recordReferral(referrerCode, newUserEmail) {
      await setDoc(doc(db, 'referrals', newUserEmail), {
        referrerCode,
        newUserEmail,
        createdAt: serverTimestamp()
      });
    },

    listenReferrals(callback) {
      return onSnapshot(collection(db, 'referrals'), (snap) => {
        const items = [];
        snap.forEach(d => items.push({ _id: d.id, ...d.data() }));
        callback(items);
      });
    },

    // User balances — set by admin, read by user
    async setUserBalance(userEmail, balance) {
      await setDoc(doc(db, 'userBalances', userEmail), { balance, updatedAt: serverTimestamp() });
    },

    listenUserBalance(userEmail, callback) {
      return onSnapshot(doc(db, 'userBalances', userEmail), (snap) => {
        callback(snap.exists() ? snap.data().balance : 0);
      });
    }
  };

  // Signal that Firebase is ready
  window.dispatchEvent(new Event('cgFirebaseReady'));
</script>

// SAFE STORAGE — never throws, falls back to in-memory if blocked
// ============================================================
const memoryStore = {};
const safeStorage = {
  getItem(key) {
    try { return localStorage.getItem(key); }
    catch(e) { return memoryStore[key] ?? null; }
  },
  setItem(key, val) {
    try { localStorage.setItem(key, val); }
    catch(e) { memoryStore[key] = val; }
  }
};

// PROFILE EDITS — admin can override name/photo/bio/etc per profile
// Synced live from Firestore into a local cache for synchronous reads
// ============================================================
let profileEditsCache = {};

function getProfileEdits() {
  return profileEditsCache;
}

function getProfile(id) {
  const base = PROFILES.find(p => p.id === id || p.id === Number(id));
  if (!base) return null;
  const edit = profileEditsCache[base.id];
  if (!edit) return base;
  const merged = { ...base, ...edit };
  if (typeof edit.interests === 'string') {
    merged.interests = edit.interests.split(',').map(s => s.trim()).filter(Boolean);
  }
  return merged;
}

function getAllProfiles() {
  return PROFILES.map(base => {
    const edit = profileEditsCache[base.id];
    if (!edit) return base;
    const merged = { ...base, ...edit };
    if (typeof edit.interests === 'string') {
      merged.interests = edit.interests.split(',').map(s => s.trim()).filter(Boolean);
    }
    return merged;
  });
}

// Seeded pseudo-random shuffle (Fisher-Yates with a simple LCG)
// so the order is stable within a session but different each time the seed changes
function shuffleWithSeed(arr, seed) {
  const result = [...arr];
  let s = seed;
  const rand = () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

  } else if (state.view === 'auth') {

  } else {

      render();

}

function setAuthTab(tab) {
  state.authTab = tab;
  state.authError = null;
  render();
}

async function doLogin() {
  const email = document.getElementById('login-email')?.value?.trim();
  const pass = document.getElementById('login-pass')?.value;
  if (!email || !pass) { state.authError = 'Please fill in all fields'; render(); return; }

  state.authLoading = true;
  state.authError = null;
  render();

  try {
    if (!window.CGAuth) throw new Error('Auth not ready, please wait a moment and try again');
    const user = await window.CGAuth.signIn(email, pass);
    state.currentUser = { name: user.name, email: user.email, uid: user.uid, bio: '' };
    state.view = 'home';
    setupFirestoreListeners();
  } catch(e) {
    state.authError = friendlyAuthError(e);
  }
  state.authLoading = false;
  render();
}

async function doSignup() {
  const name = document.getElementById('signup-name')?.value?.trim();
  const email = document.getElementById('signup-email')?.value?.trim();
  const pass = document.getElementById('signup-pass')?.value;
  if (!name || !email || !pass) { state.authError = 'Please fill in all fields'; render(); return; }
  if (pass.length < 8) { state.authError = 'Password must be at least 8 characters'; render(); return; }

  state.authLoading = true;
  state.authError = null;
  render();

  try {
    if (!window.CGAuth) throw new Error('Auth not ready, please wait a moment and try again');
    const user = await window.CGAuth.signUp(name, email, pass);
    state.currentUser = { name: user.name, email: user.email, uid: user.uid, bio: '' };
    state.view = 'home';
    showToast('🎉 Welcome to ConnectGlobal!');
    setupFirestoreListeners();
    recordReferralIfPresent();
  } catch(e) {
    state.authError = friendlyAuthError(e);
  }
  state.authLoading = false;
  render();
}

// Record who referred this new user, if a ?ref= code is in the URL
function recordReferralIfPresent() {
  try {
    if (typeof window === 'undefined' || !window.location) return;
    const params = new URLSearchParams(window.location.search);
    const refCode = params.get('ref');
    if (!refCode || !window.CGFirestore) return;
    window.CGFirestore.recordReferral(refCode, state.currentUser.email).catch(e => console.log(e));
  } catch(e) { console.log('Referral record error:', e); }
}

async function doGoogleSignIn() {
  state.authLoading = true;
  state.authError = null;
  render();

  try {
    if (!window.CGAuth) throw new Error('Auth not ready, please wait a moment and try again');
    const user = await window.CGAuth.signInWithGoogle();
    state.currentUser = { name: user.name, email: user.email, uid: user.uid, photoURL: user.photoURL, bio: '' };
    state.view = 'home';
    showToast('🎉 Welcome to ConnectGlobal!');
    setupFirestoreListeners();
    recordReferralIfPresent();
  } catch(e) {
    state.authError = friendlyAuthError(e);
  }
  state.authLoading = false;
  render();
}

async function doForgotPassword() {
  const email = document.getElementById('login-email')?.value?.trim();
  if (!email) { state.authError = 'Enter your email above first, then tap "Forgot password?"'; render(); return; }
  try {
    if (!window.CGAuth) throw new Error('Auth not ready, please wait a moment and try again');
    await window.CGAuth.resetPassword(email);
    showToast('📧 Password reset email sent to ' + email);
  } catch(e) {
    state.authError = friendlyAuthError(e);
    render();
  }
}

function friendlyAuthError(e) {
  const code = e?.code || '';
  if (code.includes('email-already-in-use')) return 'An account with this email already exists. Try signing in instead.';
  if (code.includes('invalid-credential') || code.includes('wrong-password') || code.includes('user-not-found')) return 'Incorrect email or password.';
  if (code.includes('invalid-email')) return 'Please enter a valid email address.';
  if (code.includes('weak-password')) return 'Password is too weak — use at least 8 characters.';
  if (code.includes('popup-closed-by-user')) return 'Google sign-in was cancelled.';
  if (code.includes('network-request-failed')) return 'Network error — check your connection and try again.';
  return e?.message || 'Something went wrong. Please try again.';
}

function doLogout() {
  firestoreUnsubscribers.forEach(unsub => unsub());
  firestoreUnsubscribers = [];
  if (window.CGAuth) window.CGAuth.logOut().catch(()=>{});
  state.view = 'auth';
  state.currentUser = null;
  render();
}

function goTo(view) {
  state.view = view;
  if (view !== 'chat') state.activeChat = null;
  render();
}

function setFilter(f) {
  state.filter = f;
  render();
}

function openProfile(id) {
  state.selectedProfile = getProfile(id);
  render();
}

function closeProfile(e) {
  if (e && e.target !== e.currentTarget) return;
  state.selectedProfile = null;
  render();
}

function startChat(profileId) {
  if (!state.conversations[profileId]) {
    state.conversations[profileId] = [];
    state.messageCounts[profileId] = 0;
  }
  state.selectedProfile = null;
  state.activeChat = profileId;
  state.view = 'chat';
  render();
}

function openChat(profileId) {
  state.activeChat = profileId;
  render();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendChatPhoto() {
  const fileInput = document.getElementById('chat-photo-upload');
  const file = fileInput?.files?.[0];
  if (!file) return;

  const profileId = state.activeChat;
  const profile = getProfile(profileId);

  // Check paywall first
  const count = state.messageCounts[profileId] || 0;
  const unlocked = state.unlockedProfiles[profileId] || state.unlockedGlobal;
  if (!unlocked && count >= 3) { state.paywall = profileId; render(); return; }

  showToast('⏳ Sending photo...');

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'connectglobal');

    const res = await fetch('https://api.cloudinary.com/v1_1/djcu6tsix/image/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (data.secure_url) {
      // Send as a special image message
      if (!state.conversations[profileId]) state.conversations[profileId] = [];
      const msg = {
        role: 'user',
        content: '__img__' + data.secure_url,
        time: new Date().toISOString()
      };
      state.conversations[profileId].push(msg);
      state.messageCounts[profileId] = (state.messageCounts[profileId]||0) + 1;
      saveConversationToFirestore(profileId, profile);
      fileInput.value = '';
      showToast('📷 Photo sent!');
      render();
    } else {
      showToast('⚠️ Could not send photo');
    }
  } catch(e) {
    showToast('⚠️ Error: ' + e.message);
  }
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input?.value?.trim();
  if (!text) return;
  
  const profileId = state.activeChat;
  const profile = getProfile(profileId);
  
  // Check paywall — unlock status is synced live from Firestore into state.unlockedProfiles
  const count = state.messageCounts[profileId] || 0;
  const unlocked = state.unlockedProfiles[profileId] || state.unlockedGlobal;
  
  if (!unlocked && count >= 3) {
    state.paywall = profileId;
    render();
    return;
  }
  
  // Store message locally for instant feedback
  if (!state.conversations[profileId]) state.conversations[profileId] = [];
  const msg = { role:'user', content:text, time:new Date().toISOString() };
  state.conversations[profileId].push(msg);
  state.messageCounts[profileId] = (state.messageCounts[profileId]||0) + 1;
  input.value = '';
  input.style.height = 'auto';

  // ── Sync to Firestore so admin sees it in real-time ──
  saveConversationToFirestore(profileId, profile);

  render();
}

function saveConversationToFirestore(profileId, profile) {
  if (!window.CGFirestore || !state.currentUser) return;
  window.CGFirestore.saveConversation(state.currentUser.email, profileId, {
    userName: state.currentUser.name,
    userEmail: state.currentUser.email,
    profileName: profile.name,
    profilePhoto: profile.photo,
    profileCountry: profile.country,
    messages: state.conversations[profileId] || []
  }).catch(e => console.log('Firestore save error:', e));
}

// ============================================================
// FIRESTORE REAL-TIME LISTENERS (set up after login)
// ============================================================
let firestoreUnsubscribers = [];

function setupFirestoreListeners() {
  if (!window.CGFirestore || !state.currentUser) return;

  // Clean up any existing listeners
  firestoreUnsubscribers.forEach(unsub => unsub());
  firestoreUnsubscribers = [];

  const email = state.currentUser.email;

  // Load ALL of this user's conversations upfront (fixes Messages tab being empty after re-login)
  const unsubAllConvs = window.CGFirestore.listenUserConversations(email, (convs) => {
    Object.entries(convs).forEach(([profileId, data]) => {
      if (!data.messages) return;
      const localMsgs = state.conversations[profileId] || [];
      if (data.messages.length >= localMsgs.length) {
        state.conversations[profileId] = data.messages;
        state.messageCounts[profileId] = data.messages.filter(m => m.role === 'user').length;
      }
    });
    render();
  });
  firestoreUnsubscribers.push(unsubAllConvs);

  // Listen for unlock status (per-user)
  const unsubUnlock = window.CGFirestore.listenUnlocked(email, (unlocked) => {
    if (unlocked && !state.unlockedGlobal) {
      state.unlockedGlobal = true;
      Object.keys(state.conversations).forEach(pid => state.unlockedProfiles[pid] = true);
      showToast('🎉 Your access has been unlocked! Chat freely!');
      render();
    }
  });
  firestoreUnsubscribers.push(unsubUnlock);

  // Listen for balance updates from admin — reflects instantly on user's dashboard
  const unsubBalance = window.CGFirestore.listenUserBalance(email, (balance) => {
    if (balance !== state.balanceUSD) {
      state.balanceUSD = balance;
      render();
    }
  });
  firestoreUnsubscribers.push(unsubBalance);

  // Listen for profile edits (global, applies to all users)
  const unsubEdits = window.CGFirestore.listenProfileEdits((edits) => {
    profileEditsCache = edits;
    render();
  });
  firestoreUnsubscribers.push(unsubEdits);
}

function closePaywall(e) {
  if (e && e.target !== e.currentTarget) return;
  state.paywall = null;
  state.stkSent = false;
  render();
}

async function initiateSTK() {
  const phone = document.getElementById('mpesa-phone')?.value?.trim();
  if (!phone || phone.length < 9) {
    showToast('⚠️ Enter a valid Safaricom number');
    return;
  }

  showToast('⏳ Sending M-Pesa prompt to your phone...');

  // Save pending payment to Firestore so admin sees it in real-time
  try {
    if (window.CGFirestore) {
      await window.CGFirestore.addPendingUnlock({
        userId: state.currentUser.email,
        userName: state.currentUser.name,
        phone: phone
      });
    }
  } catch(e) { console.log('Pending unlock save error:', e); }

  // TinyPesa STK Push via our secure serverless function
  try {
    const res = await fetch('/api/stk-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        phone: phone,
        amount: 100,
        userEmail: state.currentUser?.email || '',
        userName: state.currentUser?.name || ''
      })
    });
    const data = await res.json();
    console.log('Daraja STK response:', data);

    if (!data.success) {
      showToast('⚠️ ' + (data.error || 'Payment request failed — try again'));
      state.stkSent = false;
      render();
      return;
    }
  } catch(err) {
    console.log('STK push request error:', err.message);
    // Still show the waiting screen — Safaricom may have processed it
  }

  state.stkSent = true;
  render();
}



async function uploadUserPhoto() {
  const fileInput = document.getElementById('user-photo-upload');
  const file = fileInput?.files?.[0];
  if (!file) return;

  showToast('⏳ Uploading photo...');

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'connectglobal');

    const res = await fetch('https://api.cloudinary.com/v1_1/djcu6tsix/image/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (data.secure_url) {
      state.currentUser.photoURL = data.secure_url;
      showToast('✅ Photo updated!');
      render();
    } else {
      showToast('⚠️ Upload failed — try again');
    }
  } catch(e) {
    showToast('⚠️ Upload error: ' + e.message);
  }
}

function saveProfile() {
  const name = document.getElementById('edit-name')?.value;
  const email = document.getElementById('edit-email')?.value;
  const bio = document.getElementById('edit-bio')?.value;
  if (name) state.currentUser.name = name;
  if (email) state.currentUser.email = email;
  if (bio !== undefined) state.currentUser.bio = bio;
  showToast('✅ Profile saved!');
  render();
}

// ============================================================
// REFERRAL PROGRAM
// ============================================================
function getReferralCode() {
  const u = state.currentUser;
  if (!u) return '';
  // Use uid if available (Firebase), otherwise derive from email
  const base = u.uid || u.email.split('@')[0];
  // Short, URL-safe code: first 8 chars, alphanumeric only
  return base.replace(/[^a-zA-Z0-9]/g, '').slice(0, 8).toUpperCase();
}

function getReferralLink() {
  const code = getReferralCode();
  const origin = (typeof window !== 'undefined' && window.location) ? window.location.origin : 'https://connectglobal-tan.vercel.app';
  return origin + '/?ref=' + code;
}

function copyReferralLink() {
  const input = document.getElementById('referral-link');
  if (!input) return;
  input.select();
  input.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    showToast('🔗 Referral link copied!');
  } catch(e) {
    // Fallback for modern browsers
    if (navigator.clipboard) {
      navigator.clipboard.writeText(input.value);
      showToast('🔗 Referral link copied!');
    }
  }
  render();
}

function shareReferralWhatsApp() {
  const link = getReferralLink();
  const text = encodeURIComponent(
    `Hey! Join me on ConnectGlobal — earn money chatting with amazing people from around the world 💰🌍 Sign up using my link and we both get rewarded: ${link}`
  );
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

function shareReferralGeneric() {
  const link = getReferralLink();
  const text = `Hey! Join ConnectGlobal — earn money chatting with amazing people from around the world 💰🌍`;
  if (navigator.share) {
    navigator.share({ title: 'ConnectGlobal', text, url: link }).catch(()=>{});
  } else {
    copyReferralLink();
  }
}

function showToast(msg) {
  state.toast = msg;
}

function formatTime(date) {
  if (!date) return '';
  const d = new Date(date);
  return d.toLocaleTimeString('en', { hour:'2-digit', minute:'2-digit', hour12:true });
}

// ============================================================
// BIND EVENTS
// ============================================================
function bindEvents() {
  // Nothing special needed - all onclick attributes handle events
}

// ============================================================
// INIT
// ============================================================
render();

// Listen for profile edits globally (even before login) so Discover page
// reflects admin changes immediately, and restore session if already logged in
if (window.addEventListener) {
  window.addEventListener('cgFirebaseReady', () => {
    if (window.CGFirestore) {
      // Fetch once immediately so first render after auth check is correct
      window.CGFirestore.getProfileEditsOnce().then(edits => {
        profileEditsCache = edits;
        render();
      }).catch(e => console.log('Profile edits fetch error:', e));

      // Then keep listening for live changes
      window.CGFirestore.listenProfileEdits((edits) => {
        profileEditsCache = edits;
        render();
      });
    }

    // Restore session on page reload if user is already signed in
    if (window.CGAuth) {
      window.CGAuth.onAuthChange((user) => {
        if (user && state.view === 'auth') {
          state.currentUser = { name: user.name, email: user.email, uid: user.uid, photoURL: user.photoURL || null, bio: '' };
          state.view = 'home';
          setupFirestoreListeners();
        }
        state.sessionChecking = false;
        render();
      });
    } else {
      state.sessionChecking = false;
      render();
    }
  });
}

// Fallback: if Firebase never signals ready (e.g. CDN blocked), stop the
// loading spinner after 5 seconds so the user can still use the app
if (window.setTimeout) {
  setTimeout(() => {
    if (state.sessionChecking) {
      state.sessionChecking = false;
      render();
    }
  }, 5000);
}
</script>
